<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qnex admin page</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* DEFAULT THEME: DARK */
        :root {
            --bg: #000000; --text: #ffffff; --border: #ffffff;
            --hover-bg: #ffffff; --hover-text: #000000;
            --gray: #111111;
        }
        [data-theme="light"] {
            --bg: #ffffff; --text: #000000; --border: #000000;
            --hover-bg: #000000; --hover-text: #ffffff;
            --gray: #f9f9f9;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0; padding: 30px; transition: 0.3s;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 40px;
        }
        h1, h2, h3 { text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        .back-btn, .theme-btn {
            color: var(--text); text-decoration: none; border: 1px solid var(--border);
            padding: 10px 20px; cursor: pointer; background: transparent; transition: 0.3s;
            text-transform: uppercase; font-size: 12px; font-weight: bold;
        }
        .back-btn:hover, .theme-btn:hover { background: var(--text); color: var(--bg); }
        
        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 50px;
        }
        .stat-card {
            border: 1px solid var(--border); padding: 30px 20px; text-align: center;
        }
        .stat-card h3 { font-size: 14px; opacity: 0.7; }
        .stat-num { font-size: 40px; font-weight: bold; margin-top: 15px; }

        .grid { display: grid; grid-template-columns: 1fr 2.5fr; gap: 40px; }
        @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } }
        
        .panel-box { border: 1px solid var(--border); padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); box-sizing: border-box; font-family: inherit;
        }
        .btn {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            padding: 15px; cursor: pointer; text-transform: uppercase; font-family: inherit;
            width: 100%; transition: 0.3s; font-weight: bold; margin-top: 10px;
        }
        .btn:hover { background: var(--text); color: var(--bg); }
        
        /* Table */
        .sheet-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        .sheet-table th, .sheet-table td { border: 1px solid var(--border); padding: 15px; text-align: left; }
        .sheet-table th { background-color: var(--text); color: var(--bg); text-transform: uppercase; letter-spacing: 1px; }
        .sheet-table tr:nth-child(even) { background-color: var(--gray); }
        .delete-btn { color: #ff4444; background: none; border: none; font-weight: bold; cursor: pointer; font-size: 16px;}
    </style>
</head>
<body>
    <header>
        <div>
            <h1>ADMIN DASHBOARD</h1>
            <p style="margin: 5px 0 0 0; font-size: 12px; opacity: 0.7;">Analytics & Store Management</p>
        </div>
        <div style="display: flex; gap: 15px;">
            <button class="theme-btn" onclick="toggleTheme()">Invert Theme</button>
            <a href="index.html" class="back-btn">Go to Store →</a>
        </div>
    </header>

    <!-- STATISTICS -->
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Orders (This Month)</h3>
            <div class="stat-num" id="stat-month-orders">0</div>
        </div>
        <div class="stat-card">
            <h3>Revenue (This Month)</h3>
            <div class="stat-num" id="stat-month-revenue">$0</div>
        </div>
        <div class="stat-card">
            <h3>Total Orders</h3>
            <div class="stat-num" id="stat-total-orders">0</div>
        </div>
        <div class="stat-card">
            <h3>Total Revenue</h3>
            <div class="stat-num" id="stat-total-revenue">$0</div>
        </div>
    </div>

    <div class="grid">
        <!-- ADD PRODUCT -->
        <div class="panel-box">
            <h2>Add Product</h2>
            <form id="product-form" style="margin-top: 30px;">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="p-title" required placeholder="e.g. Minimalist Hoodie">
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="p-price" required placeholder="e.g. 50">
                </div>
                <div class="form-group">
                    <label>Upload Photo</label>
                    <input type="file" id="p-file" accept="image/*" style="padding: 10px 5px;">
                    <p style="font-size: 11px; margin-top: 5px; opacity: 0.6;">Leave empty to use default box icon</p>
                </div>
                <button type="submit" class="btn" id="upload-btn">Publish to Store</button>
            </form>
        </div>

        <!-- CRM (CLIENTS) -->
        <div class="panel-box">
            <h2>Orders Database</h2>
            <form id="client-form" style="display: flex; gap: 15px; margin-top: 30px; flex-wrap: wrap;">
                <input type="text" id="c-name" required placeholder="Customer Name" style="flex: 2; min-width: 150px;">
                <input type="number" id="c-sum" required placeholder="Amount ($)" style="flex: 1; min-width: 100px;">
                <select id="c-status" style="flex: 1; min-width: 120px;">
                    <option value="Paid">Paid</option>
                    <option value="Processing">Processing</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
                <button type="submit" class="btn" style="flex: 0; width: 60px; margin-top: 0; padding: 12px;">+</button>
            </form>

            <div style="overflow-x: auto;">
                <table class="sheet-table">
                    <thead><tr><th>Client</th><th>Amount</th><th>Status</th><th>Date</th><th>Del</th></tr></thead>
                    <tbody id="clients-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- THEME TOGGLE ---
        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') { document.body.setAttribute('data-theme', 'light'); } 
        else { document.body.setAttribute('data-theme', 'dark'); }

        // --- FIREBASE CONFIG (INSERT YOURS HERE) ---
       const firebaseConfig = {
  apiKey: "AIzaSyDX8BiSqlghdgOj4_zPSyPgATfHVV5DNQI",
  authDomain: "gifts-d8f30.firebaseapp.com",
  databaseURL: "https://gifts-d8f30-default-rtdb.firebaseio.com",
  projectId: "gifts-d8f30",
  storageBucket: "gifts-d8f30.firebasestorage.app",
  messagingSenderId: "883903383261",
  appId: "1:883903383261:web:dad1742c009ea38bf5fd34",
  measurementId: "G-5JFXH4YG3J"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- ADD PRODUCT (AUTO COMPRESS IMAGE) ---
        document.getElementById('product-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('upload-btn');
            btn.innerText = 'Uploading...';
            btn.disabled = true;

            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const fileInput = document.getElementById('p-file');

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; 
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const base64Image = canvas.toDataURL('image/jpeg', 0.6);
                        saveProduct(title, price, base64Image);
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveProduct(title, price, "📦");
            }
        });

        function saveProduct(title, price, imgString) {
            db.collection("products").add({
                title: title, price: price, img: imgString,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert('Product successfully added!');
                document.getElementById('product-form').reset();
                document.getElementById('upload-btn').innerText = 'Publish to Store';
                document.getElementById('upload-btn').disabled = false;
            }).catch(err => {
                console.error(err);
                alert('Error uploading. Image might be too large.');
                document.getElementById('upload-btn').innerText = 'Publish to Store';
                document.getElementById('upload-btn').disabled = false;
            });
        }

        // --- CRM (ORDERS & STATS) ---
        document.getElementById('client-form').addEventListener('submit', function(e) {
            e.preventDefault();
            db.collection("sales").add({
                name: document.getElementById('c-name').value,
                sum: Number(document.getElementById('c-sum').value),
                status: document.getElementById('c-status').value,
                date: new Date().toLocaleDateString('en-US'),
                timestamp: Date.now()
            }).then(() => document.getElementById('client-form').reset());
        });

        db.collection("sales").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const tbody = document.getElementById('clients-table-body');
            tbody.innerHTML = '';
            
            let totalRev = 0, totalOrd = 0, monthRev = 0, monthOrd = 0;
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                
                if (data.status !== 'Cancelled') {
                    totalRev += data.sum;
                    totalOrd++;
                    const orderDate = new Date(data.timestamp);
                    if (orderDate.getMonth() === currentMonth && orderDate.getFullYear() === currentYear) {
                        monthRev += data.sum;
                        monthOrd++;
                    }
                }

                let statusStyle = '';
                if (data.status === 'Paid') statusStyle = 'color: #4CAF50; font-weight: bold;';
                if (data.status === 'Processing') statusStyle = 'opacity: 0.7; font-style: italic;';
                if (data.status === 'Cancelled') statusStyle = 'color: #ff4444; text-decoration: line-through;';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${data.name}</td>
                    <td>$${data.sum}</td>
                    <td style="${statusStyle}">${data.status}</td>
                    <td>${data.date}</td>
                    <td><button class="delete-btn" onclick="deleteSale('${id}')">✕</button></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-total-orders').innerText = totalOrd;
            document.getElementById('stat-total-revenue').innerText = '$' + totalRev.toLocaleString('en-US');
            document.getElementById('stat-month-orders').innerText = monthOrd;
            document.getElementById('stat-month-revenue').innerText = '$' + monthRev.toLocaleString('en-US');
        });

        window.deleteSale = function(id) {
            if (confirm("Delete this record permanently?")) db.collection("sales").doc(id).delete();
        }
    </script>
</body>
</html>
