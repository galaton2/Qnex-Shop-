<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qnex Admin</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg: #000000; --text: #ffffff; --border: #ffffff;
            --hover-bg: #ffffff; --hover-text: #000000; --gray: #111111;
        }
        [data-theme="light"] {
            --bg: #ffffff; --text: #000000; --border: #000000;
            --hover-bg: #000000; --hover-text: #ffffff; --gray: #f9f9f9;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; transition: 0.3s;
        }
        
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; gap: 15px;
        }
        h1, h2, h3 { text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        .action-btn {
            color: var(--text); text-decoration: none; border: 1px solid var(--border);
            padding: 10px 15px; cursor: pointer; background: transparent; transition: 0.3s;
            text-transform: uppercase; font-size: 12px; font-weight: bold; text-align: center;
        }
        .action-btn:hover, .action-btn.active { background: var(--text); color: var(--bg); }

        /* TABS NAV */
        .tabs-nav {
            display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;
            border-bottom: 1px solid var(--gray); padding-bottom: 10px;
        }
        .tab-btn {
            background: none; border: none; color: var(--text); opacity: 0.5;
            font-size: 14px; text-transform: uppercase; font-weight: bold;
            cursor: pointer; padding: 10px 5px; transition: 0.3s;
        }
        .tab-btn.active, .tab-btn:hover { opacity: 1; border-bottom: 2px solid var(--text); }
        
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* STATS CONTROLS */
        .stats-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }
        select.period-select {
            padding: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border);
            text-transform: uppercase; font-weight: bold; font-size: 14px; cursor: pointer;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card { border: 1px solid var(--border); padding: 25px 15px; text-align: center; }
        .stat-card h3 { font-size: 14px; opacity: 0.7; }
        .stat-num { font-size: 32px; font-weight: bold; margin-top: 15px; }
        .profit-text { color: #4CAF50; }

        .panel-box { border: 1px solid var(--border); padding: 30px; margin-bottom: 30px;}
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); box-sizing: border-box; font-family: inherit;
        }
        
        .crm-form { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 768px) { .crm-form { grid-template-columns: repeat(2, 1fr); } }
        
        .btn {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            padding: 12px; cursor: pointer; text-transform: uppercase; font-family: inherit;
            width: 100%; transition: 0.3s; font-weight: bold; margin-top: 10px;
        }
        .btn:hover { background: var(--text); color: var(--bg); }
        
        /* Products Grid */
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;
        }
        .product-card {
            border: 1px solid var(--border); padding: 15px; position: relative; display: flex; flex-direction: column;
        }
        .product-card .img-preview {
            width: 100%; height: 200px; object-fit: cover; margin-bottom: 15px; background: var(--gray);
        }
        .product-card .photos-count {
            position: absolute; top: 25px; left: 25px; background: var(--text); color: var(--bg); 
            padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 10px;
        }
        .product-card h3 { font-size: 16px; margin-bottom: 5px; }
        .product-card p { margin: 0; opacity: 0.7; font-size: 14px; margin-bottom: 15px;}
        
        .delete-btn { 
            color: #ff4444; background: none; border: 1px solid #ff4444; font-weight: bold; 
            cursor: pointer; padding: 5px 10px; transition: 0.3s; width: 100%; text-transform: uppercase;
        }
        .delete-btn:hover { background: #ff4444; color: white; }
        
        .edit-btn { 
            color: #3b82f6; background: none; border: 1px solid #3b82f6; font-weight: bold; 
            cursor: pointer; padding: 5px 10px; transition: 0.3s; text-transform: uppercase; margin-right: 5px;
        }
        .edit-btn:hover { background: #3b82f6; color: white; }

        /* Table (Responsive mobile fix) */
        .table-responsive { width: 100%; margin-top: 20px; }
        .sheet-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .sheet-table th, .sheet-table td { border: 1px solid var(--border); padding: 15px; text-align: left; }
        .sheet-table th { background-color: var(--text); color: var(--bg); text-transform: uppercase; letter-spacing: 1px; }
        .sheet-table tr:nth-child(even) { background-color: var(--gray); }
        .contact-link { color: #3b82f6; text-decoration: none; font-weight: bold; }

        /* MOBILE TABLE CSS */
        @media (max-width: 768px) {
            .sheet-table thead { display: none; }
            .sheet-table, .sheet-table tbody, .sheet-table tr, .sheet-table td { display: block; width: 100%; box-sizing: border-box; }
            .sheet-table tr { margin-bottom: 20px; border: 2px solid var(--border); }
            .sheet-table td { text-align: right; padding-left: 45%; position: relative; border: none; border-bottom: 1px solid var(--gray); }
            .sheet-table td:last-child { border-bottom: none; }
            .sheet-table td::before { 
                content: attr(data-label); position: absolute; left: 15px; width: 40%; 
                text-align: left; font-weight: bold; text-transform: uppercase; font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <script>
        // --- 1. СИСТЕМА БЕЗОПАСНОСТИ ---
        const SECRET_KEY = "qnex"; 
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.get('key') === SECRET_KEY) {
            localStorage.setItem('qnex_admin_access', SECRET_KEY);
            window.history.replaceState({}, document.title, window.location.pathname); 
        } else if (localStorage.getItem('qnex_admin_access') !== SECRET_KEY) {
            alert("Access Denied! Device not whitelisted.");
            window.location.href = "index.html";
        }
    </script>

    <div class="container">
        <header>
            <div>
                <h1>QNEX ADMIN</h1>
                <p style="margin: 5px 0 0 0; font-size: 12px; opacity: 0.7;" data-i18n="subtitle">Analytics & Store Management</p>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="toggleLang()" id="lang-btn">RU</button>
                <button class="action-btn" onclick="toggleTheme()" data-i18n="invert_theme">Invert Theme</button>
                <a href="index.html" class="action-btn" data-i18n="go_store">Go to Store →</a>
            </div>
        </header>

        <div class="tabs-nav">
            <button class="tab-btn active" id="btn-tab-dashboard" onclick="openTab('dashboard')" data-i18n="tab_dashboard">Dashboard</button>
            <button class="tab-btn" id="btn-tab-add-product" onclick="openTab('add-product')" data-i18n="tab_add_product">Add Product</button>
            <button class="tab-btn" id="btn-tab-products" onclick="openTab('products')" data-i18n="tab_products">Products</button>
            <button class="tab-btn" id="btn-tab-add-crm" onclick="openTab('add-crm')" data-i18n="tab_add_crm">Add Order</button>
            <button class="tab-btn" id="btn-tab-crm" onclick="openTab('crm')" data-i18n="tab_crm">Orders DB</button>
        </div>

        <!-- ================= TAB 1: DASHBOARD ================= -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="stats-header">
                <h2 data-i18n="stats_title">Store Statistics</h2>
                <select class="period-select" id="stats-period" onchange="updateStats()">
                    <option value="today" data-i18n="per_today">Today</option>
                    <option value="week" data-i18n="per_week">This Week</option>
                    <option value="month" selected data-i18n="per_month">This Month</option>
                    <option value="year" data-i18n="per_year">This Year</option>
                    <option value="all" data-i18n="per_all">All Time</option>
                </select>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 data-i18n="stat_visits">Visits</h3>
                    <div class="stat-num" id="stat-visits">0</div>
                </div>
                <div class="stat-card">
                    <h3 data-i18n="stat_orders">Orders</h3>
                    <div class="stat-num" id="stat-orders">0</div>
                </div>
                <div class="stat-card">
                    <h3 data-i18n="stat_revenue">Revenue</h3>
                    <div class="stat-num" id="stat-revenue">$0</div>
                </div>
                <div class="stat-card" style="border-color: #4CAF50;">
                    <h3 data-i18n="stat_profit" style="color: #4CAF50;">Net Profit</h3>
                    <div class="stat-num profit-text" id="stat-profit">$0</div>
                </div>
            </div>
        </div>

        <!-- ================= TAB 2: ADD PRODUCT ================= -->
        <div id="tab-add-product" class="tab-content">
            <div class="panel-box" style="max-width: 600px; margin: 0 auto;">
                <h2 data-i18n="add_product">Add Product</h2>
                <form id="product-form" style="margin-top: 20px;">
                    <div class="form-group">
                        <label data-i18n="prod_name">Product Name</label>
                        <input type="text" id="p-title" required placeholder="e.g. Minimalist Hoodie">
                    </div>
                    <!-- Категории теперь совпадают с индексом -->
                    <div class="form-group">
                        <label data-i18n="prod_category">Category</label>
                        <select id="p-category" required>
                            <option value="hoodie" data-i18n="cat_hoodie">Hoodies</option>
                            <option value="t-shirt" data-i18n="cat_tshirt">T-Shirts</option>
                            <option value="pants" data-i18n="cat_pants">Pants</option>
                            <option value="accessories" data-i18n="cat_accessories">Accessories</option>
                            <option value="other" data-i18n="cat_other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="prod_price">Price ($)</label>
                        <input type="number" id="p-price" required placeholder="e.g. 50">
                    </div>
                    <div class="form-group">
                        <label data-i18n="prod_photo">Upload Photos (Multiple)</label>
                        <input type="file" id="p-file" accept="image/*" multiple style="padding: 8px 5px;">
                        <p style="font-size: 11px; opacity: 0.7; margin-top: 5px;" data-i18n="photo_hint">You can select multiple images.</p>
                    </div>
                    <button type="submit" class="btn" id="upload-btn" data-i18n="btn_publish">Publish to Store</button>
                </form>
            </div>
        </div>

        <!-- ================= TAB 3: PRODUCTS LIST ================= -->
        <div id="tab-products" class="tab-content">
            <h2 data-i18n="tab_products" style="margin-bottom: 20px;">Products</h2>
            <div class="products-grid" id="products-list-grid"></div>
        </div>

        <!-- ================= TAB 4: ADD ORDER ================= -->
        <div id="tab-add-crm" class="tab-content">
            <div class="panel-box" style="max-width: 800px; margin: 0 auto;">
                <h2 data-i18n="add_order">Add New Order</h2>
                <form id="client-form" class="crm-form" style="margin-top: 20px;">
                    <div>
                        <label data-i18n="crm_client">Client Name</label>
                        <input type="text" id="c-name" required placeholder="Name">
                    </div>
                    <div>
                        <label data-i18n="crm_contact">Contact (Tg/Phone)</label>
                        <input type="text" id="c-contact" placeholder="@username or +998...">
                    </div>
                    <div>
                        <label data-i18n="crm_price">Price ($)</label>
                        <input type="number" id="c-sum" required placeholder="0">
                    </div>
                    <div>
                        <label data-i18n="crm_cost">Cost ($)</label>
                        <input type="number" id="c-cost" required placeholder="0">
                    </div>
                    <div>
                        <label data-i18n="crm_status">Status</label>
                        <select id="c-status">
                            <option value="Paid">Paid</option>
                            <option value="Processing">Processing</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div style="display: flex; align-items: flex-end;">
                        <button type="submit" class="btn" data-i18n="btn_add_order">Add Order</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ================= TAB 5: ORDERS DB ================= -->
        <div id="tab-crm" class="tab-content">
            <h2 data-i18n="crm_title">Orders Database</h2>
            <div class="table-responsive">
                <table class="sheet-table">
                    <thead>
                        <tr>
                            <th data-i18n="tbl_client">Client</th>
                            <th data-i18n="tbl_contact">Contact</th>
                            <th data-i18n="tbl_sum">Sum</th>
                            <th data-i18n="tbl_cost">Cost</th>
                            <th data-i18n="tbl_profit">Profit</th>
                            <th data-i18n="tbl_status">Status</th>
                            <th data-i18n="tbl_date">Date</th>
                            <th data-i18n="tbl_action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="clients-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ================= EDIT ORDER MODAL ================= -->
    <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="panel-box" style="background:var(--bg); border:1px solid var(--border); width: 90%; max-width:600px; position:relative; padding:30px; margin: 0;">
            <button onclick="document.getElementById('edit-modal').style.display='none'" style="position:absolute; right:15px; top:15px; background:none; border:none; color:var(--text); font-size:20px; cursor:pointer;">✕</button>
            <h2 data-i18n="edit_order">Edit Order</h2>
            <form id="edit-form" class="crm-form" style="margin-top:20px;">
                <input type="hidden" id="edit-id">
                <div>
                    <label data-i18n="crm_client">Client Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div>
                    <label data-i18n="crm_contact">Contact (Tg/Phone)</label>
                    <input type="text" id="edit-contact">
                </div>
                <div>
                    <label data-i18n="crm_price">Price ($)</label>
                    <input type="number" id="edit-sum" required>
                </div>
                <div>
                    <label data-i18n="crm_cost">Cost ($)</label>
                    <input type="number" id="edit-cost" required>
                </div>
                <div>
                    <label data-i18n="crm_status">Status</label>
                    <select id="edit-status">
                        <option value="Paid">Paid</option>
                        <option value="Processing">Processing</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div style="display:flex; align-items:flex-end;">
                    <button type="submit" class="btn" data-i18n="btn_save">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- TABS LOGIC ---
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`btn-tab-${tabId}`).classList.add('active');
        }

        // --- TRANSLATIONS ---
        const translations = {
            en: {
                subtitle: "Analytics & Store Management", invert_theme: "Invert Theme", go_store: "Go to Store →",
                tab_dashboard: "Dashboard", tab_add_product: "Add Product", tab_products: "Products", tab_add_crm: "Add Order", tab_crm: "Orders List",
                stats_title: "Store Statistics",
                per_today: "Today", per_week: "This Week", per_month: "This Month", per_year: "This Year", per_all: "All Time",
                stat_visits: "Visits", stat_orders: "Orders", stat_revenue: "Revenue", stat_profit: "Net Profit",
                add_product: "Add Product", prod_name: "Product Name", prod_category: "Category", 
                cat_hoodie: "Hoodies", cat_tshirt: "T-Shirts", cat_pants: "Pants", cat_accessories: "Accessories", cat_other: "Other",
                prod_price: "Price ($)", prod_photo: "Upload Photos", photo_hint: "You can select multiple images.", btn_publish: "Publish to Store",
                add_order: "Add New Order", btn_add_order: "Add Order", edit_order: "Edit Order", btn_save: "Save Changes",
                crm_title: "Orders Database", crm_client: "Client Name", crm_contact: "Contact (Tg/Phone)", crm_price: "Price ($)", crm_cost: "Cost ($)", crm_status: "Status",
                tbl_client: "Client", tbl_contact: "Contact", tbl_sum: "Sum", tbl_cost: "Cost", tbl_profit: "Profit", tbl_status: "Status", tbl_date: "Date", tbl_action: "Action",
                del_btn: "Delete", msg_prod_added: "Product successfully added!", msg_order_added: "Order successfully added!"
            },
            ru: {
                subtitle: "Аналитика и Управление", invert_theme: "Сменить тему", go_store: "В магазин →",
                tab_dashboard: "Дашборд", tab_add_product: "Добавить Товар", tab_products: "Товары", tab_add_crm: "Добавить заказ", tab_crm: "База Заказов",
                stats_title: "Статистика Магазина",
                per_today: "Сегодня", per_week: "Эта неделя", per_month: "Этот месяц", per_year: "Этот год", per_all: "За все время",
                stat_visits: "Визиты", stat_orders: "Заказы", stat_revenue: "Выручка", stat_profit: "Чистая Прибыль",
                add_product: "Создать Товар", prod_name: "Название", prod_category: "Категория", 
                cat_hoodie: "Худи", cat_tshirt: "Футболки", cat_pants: "Штаны", cat_accessories: "Аксессуары", cat_other: "Другое",
                prod_price: "Цена ($)", prod_photo: "Фотографии (Можно несколько)", photo_hint: "Выделите несколько фото при выборе файлов.", btn_publish: "Опубликовать",
                add_order: "Оформить Заказ", btn_add_order: "Добавить в базу", edit_order: "Редактировать заказ", btn_save: "Сохранить изменения",
                crm_title: "База Клиентов", crm_client: "Имя клиента", crm_contact: "Контакт (Tg/Тел)", crm_price: "Сумма ($)", crm_cost: "Себестоим. ($)", crm_status: "Статус",
                tbl_client: "Клиент", tbl_contact: "Контакт", tbl_sum: "Сумма", tbl_cost: "Расход", tbl_profit: "Профит", tbl_status: "Статус", tbl_date: "Дата", tbl_action: "Действие",
                del_btn: "Удалить", msg_prod_added: "Успешно добавлено!", msg_order_added: "Заказ успешно добавлен!"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'ru'; 
        document.getElementById('lang-btn').innerText = currentLang === 'en' ? 'RU' : 'EN';

        function updateTexts() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            const updateStatusOptions = (selectId) => {
                const s = document.getElementById(selectId);
                s.options[0].text = currentLang === 'en' ? 'Paid' : 'Оплачен';
                s.options[1].text = currentLang === 'en' ? 'Processing' : 'В обработке';
                s.options[2].text = currentLang === 'en' ? 'Cancelled' : 'Отменен';
            }
            updateStatusOptions('c-status');
            updateStatusOptions('edit-status');
            renderTable();
            renderProductsList();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            localStorage.setItem('lang', currentLang);
            document.getElementById('lang-btn').innerText = currentLang === 'en' ? 'RU' : 'EN';
            updateTexts();
        }

        function toggleTheme() {
            const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light'); 

        // --- FIREBASE INIT ---
        const firebaseConfig = {
            apiKey: "AIzaSyDX8BiSqlghdgOj4_zPSyPgATfHVV5DNQI",
            authDomain: "gifts-d8f30.firebaseapp.com",
            projectId: "gifts-d8f30",
            storageBucket: "gifts-d8f30.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- DATA ARRAYS ---
        let allOrders = [];
        let allProducts = [];
        let visitsData = {};

        // Fetch Visits
        db.collection("analytics").doc("visits").onSnapshot(doc => {
            if(doc.exists) { visitsData = doc.data(); updateStats(); }
        });

        // Fetch CRM Orders
        db.collection("sales").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            allOrders = [];
            snapshot.forEach(doc => { allOrders.push({ id: doc.id, ...doc.data() }); });
            renderTable();
            updateStats();
        });

        // Fetch Products
        db.collection("products").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            allProducts = [];
            snapshot.forEach(doc => { allProducts.push({ id: doc.id, ...doc.data() }); });
            renderProductsList();
        });

        // --- STATS FILTER ---
        function updateStats() {
            const period = document.getElementById('stats-period').value;
            const now = new Date();
            let startTime = 0; 
            if (period === 'today') startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            else if (period === 'week') {
                const day = now.getDay() || 7; 
                startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day + 1).getTime();
            }
            else if (period === 'month') startTime = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
            else if (period === 'year') startTime = new Date(now.getFullYear(), 0, 1).getTime();

            let ordCount = 0, rev = 0, prof = 0;
            allOrders.forEach(order => {
                if (order.status !== 'Cancelled' && order.timestamp >= startTime) {
                    ordCount++;
                    rev += order.sum;
                    prof += (order.sum - (order.cost || 0));
                }
            });

            let totalVisits = 0;
            if (period === 'all') {
                Object.keys(visitsData).forEach(k => { if(k.length === 10) totalVisits += visitsData[k]; });
            } else {
                Object.keys(visitsData).forEach(k => {
                    if (k.length === 10) {
                        const dateParts = k.split('-');
                        const docDate = new Date(dateParts[0], dateParts[1]-1, dateParts[2]).getTime();
                        if (docDate >= startTime) totalVisits += visitsData[k];
                    }
                });
            }

            document.getElementById('stat-visits').innerText = totalVisits;
            document.getElementById('stat-orders').innerText = ordCount;
            document.getElementById('stat-revenue').innerText = '$' + rev.toLocaleString();
            document.getElementById('stat-profit').innerText = '$' + prof.toLocaleString();
        }

        // --- RENDER CRM TABLE ---
        function renderTable() {
            const tbody = document.getElementById('clients-table-body');
            tbody.innerHTML = '';
            
            const lblClient = translations[currentLang].tbl_client;
            const lblContact = translations[currentLang].tbl_contact;
            const lblSum = translations[currentLang].tbl_sum;
            const lblCost = translations[currentLang].tbl_cost;
            const lblProfit = translations[currentLang].tbl_profit;
            const lblStatus = translations[currentLang].tbl_status;
            const lblDate = translations[currentLang].tbl_date;
            
            allOrders.forEach(data => {
                const profit = data.sum - (data.cost || 0);
                
                let contactHtml = `<span>${data.contact || '-'}</span>`;
                if(data.contact && data.contact.startsWith('@')) contactHtml = `<a href="https://t.me/${data.contact.substring(1)}" target="_blank" class="contact-link">${data.contact}</a>`;
                else if (data.contact && data.contact.startsWith('+')) contactHtml = `<a href="https://wa.me/${data.contact.replace(/\D/g,'')}" target="_blank" class="contact-link">${data.contact}</a>`;

                let displayStatus = data.status;
                if (currentLang === 'ru') {
                    if (displayStatus === 'Paid') displayStatus = 'Оплачен';
                    if (displayStatus === 'Processing') displayStatus = 'В обработке';
                    if (displayStatus === 'Cancelled') displayStatus = 'Отменен';
                }
                let statusStyle = data.status === 'Paid' ? 'color: #4CAF50; font-weight: bold;' : 
                                  data.status === 'Processing' ? 'opacity: 0.7; font-style: italic;' : 
                                  'color: #ff4444; text-decoration: line-through;';

                tbody.innerHTML += `
                    <tr>
                        <td data-label="${lblClient}">${data.name}</td>
                        <td data-label="${lblContact}">${contactHtml}</td>
                        <td data-label="${lblSum}">$${data.sum}</td>
                        <td data-label="${lblCost}" style="opacity: 0.7;">$${data.cost || 0}</td>
                        <td data-label="${lblProfit}" style="color: #4CAF50; font-weight: bold;">$${profit}</td>
                        <td data-label="${lblStatus}" style="${statusStyle}">${displayStatus}</td>
                        <td data-label="${lblDate}">${data.date}</td>
                        <td data-label="Action">
                            <div style="display:flex;">
                                <button class="edit-btn" onclick="editSale('${data.id}')">✎</button>
                                <button class="delete-btn" style="width:auto; padding: 5px 15px;" onclick="deleteSale('${data.id}')">✕</button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        // --- RENDER PRODUCTS ---
        function renderProductsList() {
            const grid = document.getElementById('products-list-grid');
            grid.innerHTML = '';
            
            allProducts.forEach(prod => {
                let coverImg = "📦";
                let photoCount = 0;
                
                if (prod.images && Array.isArray(prod.images) && prod.images.length > 0) {
                    coverImg = prod.images[0];
                    photoCount = prod.images.length;
                } else if (prod.img) {
                    coverImg = prod.img;
                    photoCount = 1;
                }
                
                let catLabel = prod.category || 'other';
                if (currentLang === 'ru') {
                    if (catLabel === 'hoodie') catLabel = 'Худи';
                    if (catLabel === 't-shirt') catLabel = 'Футболки';
                    if (catLabel === 'pants') catLabel = 'Штаны';
                    if (catLabel === 'accessories') catLabel = 'Аксессуары';
                    if (catLabel === 'other') catLabel = 'Другое';
                }

                grid.innerHTML += `
                    <div class="product-card">
                        ${photoCount > 1 ? `<div class="photos-count">${photoCount} Фото</div>` : ''}
                        ${coverImg.startsWith('data:') ? `<img src="${coverImg}" class="img-preview">` : `<div class="img-preview" style="display:flex; align-items:center; justify-content:center; font-size:40px;">${coverImg}</div>`}
                        <h3>${prod.title}</h3>
                        <p>$${prod.price} • ${catLabel}</p>
                        <button class="delete-btn" onclick="deleteProduct('${prod.id}')">${translations[currentLang].del_btn}</button>
                    </div>
                `;
            });
        }

        // --- ADD PHOTOS & PRODUCT ---
        document.getElementById('product-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('upload-btn'); btn.disabled = true;
            const title = document.getElementById('p-title').value;
            const category = document.getElementById('p-category').value;
            const price = document.getElementById('p-price').value;
            const fileInput = document.getElementById('p-file');

            const files = fileInput.files;
            
            if (files.length > 0) {
                let promises = Array.from(files).map(file => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const img = new Image();
                            img.onload = function() {
                                const canvas = document.createElement('canvas'); const scale = 600 / img.width;
                                canvas.width = 600; canvas.height = img.height * scale;
                                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                                resolve(canvas.toDataURL('image/jpeg', 0.6));
                            }
                            img.src = e.target.result;
                        }
                        reader.readAsDataURL(file);
                    });
                });
                Promise.all(promises).then(imagesArray => {
                    saveProductToDb(title, category, price, imagesArray);
                });
            } else {
                saveProductToDb(title, category, price, []); 
            }
        });

        function saveProductToDb(title, category, price, imagesArray) {
            db.collection("products").add({ 
                title: title, category: category, price: price, 
                images: imagesArray, createdAt: firebase.firestore.FieldValue.serverTimestamp() 
            })
            .then(() => { 
                document.getElementById('product-form').reset(); 
                document.getElementById('upload-btn').disabled = false; 
                alert(translations[currentLang].msg_prod_added);
            });
        }

        // --- ADD ORDER ---
        document.getElementById('client-form').addEventListener('submit', function(e) {
            e.preventDefault();
            db.collection("sales").add({
                name: document.getElementById('c-name').value, contact: document.getElementById('c-contact').value || '-',
                sum: Number(document.getElementById('c-sum').value), cost: Number(document.getElementById('c-cost').value),
                status: document.getElementById('c-status').value, date: new Date().toLocaleDateString('en-US'), timestamp: Date.now()
            }).then(() => {
                document.getElementById('client-form').reset();
                alert(translations[currentLang].msg_order_added); 
            });
        });

        // --- EDIT ORDER ---
        window.editSale = id => {
            const order = allOrders.find(o => o.id === id);
            if(!order) return;
            document.getElementById('edit-id').value = order.id;
            document.getElementById('edit-name').value = order.name;
            document.getElementById('edit-contact').value = order.contact;
            document.getElementById('edit-sum').value = order.sum;
            document.getElementById('edit-cost').value = order.cost || 0;
            document.getElementById('edit-status').value = order.status;
            document.getElementById('edit-modal').style.display = 'flex';
        };

        document.getElementById('edit-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            db.collection("sales").doc(id).update({
                name: document.getElementById('edit-name').value,
                contact: document.getElementById('edit-contact').value,
                sum: Number(document.getElementById('edit-sum').value),
                cost: Number(document.getElementById('edit-cost').value),
                status: document.getElementById('edit-status').value
            }).then(() => {
                document.getElementById('edit-modal').style.display = 'none';
            });
        });

        // --- DELETIONS ---
        window.deleteSale = id => { if (confirm(currentLang === 'en' ? "Delete record?" : "Удалить запись?")) db.collection("sales").doc(id).delete(); }
        window.deleteProduct = id => { if (confirm(currentLang === 'en' ? "Delete product?" : "Удалить товар?")) db.collection("products").doc(id).delete(); }

        updateTexts();
    </script>
</body>
</html>
