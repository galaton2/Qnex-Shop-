<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qnex Admin</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #000000; --text: #ffffff; --border: #ffffff;
            --hover-bg: #ffffff; --hover-text: #000000; --gray: #111111;
            --success: #4CAF50; --danger: #ff4444;
        }
        [data-theme="light"] {
            --bg: #ffffff; --text: #000000; --border: #000000;
            --hover-bg: #000000; --hover-text: #ffffff; --gray: #f9f9f9;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; transition: 0.3s;
        }
        
        .container { padding: 20px; max-width: 1600px; margin: 0 auto; }
        
        header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; gap: 15px;
        }
        h1, h2, h3 { text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        .action-btn {
            color: var(--text); text-decoration: none; border: 1px solid var(--border);
            padding: 10px 15px; cursor: pointer; background: transparent; transition: 0.3s;
            text-transform: uppercase; font-size: 12px; font-weight: bold; text-align: center;
        }
        .action-btn:hover, .action-btn.active { background: var(--text); color: var(--bg); }

        /* TABS NAV */
        .tabs-nav {
            display: flex; gap: 15px; margin-bottom: 30px;
            border-bottom: 1px solid var(--gray); padding-bottom: 10px; flex-wrap: wrap;
        }
        .tab-btn {
            background: none; border: none; color: var(--text); opacity: 0.5;
            font-size: 16px; text-transform: uppercase; font-weight: bold;
            cursor: pointer; padding: 10px 0; transition: 0.3s;
        }
        .tab-btn.active, .tab-btn:hover { opacity: 1; border-bottom: 2px solid var(--text); }
        
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* STATS CONTROLS */
        .stats-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }
        select {
            padding: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border);
            text-transform: uppercase; font-weight: bold; font-size: 14px; cursor: pointer;
        }

        /* Stats & Products Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card { border: 1px solid var(--border); padding: 25px 15px; text-align: center; display: flex; flex-direction: column; justify-content: center;}
        .stat-card h3 { font-size: 14px; opacity: 0.7; }
        .stat-num { font-size: 32px; font-weight: bold; margin-top: 15px; }
        .profit-text { color: var(--success); }

        .panel-box { border: 1px solid var(--border); padding: 30px; margin-bottom: 30px; width: 100%; box-sizing: border-box; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); box-sizing: border-box; font-family: inherit;
        }
        
        .crm-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; align-items: end; margin-top: 20px;}
        .btn {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            padding: 12px; cursor: pointer; text-transform: uppercase; font-family: inherit;
            width: 100%; transition: 0.3s; font-weight: bold;
        }
        .btn:hover { background: var(--text); color: var(--bg); }
        .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); margin-top: auto; }
        .btn-danger:hover { background: #cc0000; border-color: #cc0000; color: #fff; }

        /* Table */
        .table-responsive { overflow-x: auto; margin-top: 20px; width: 100%; }
        .sheet-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1000px; white-space: nowrap; }
        .sheet-table th, .sheet-table td { border: 1px solid var(--border); padding: 15px; text-align: left; }
        .sheet-table th { background-color: var(--text); color: var(--bg); text-transform: uppercase; letter-spacing: 1px; }
        .sheet-table tr:nth-child(even) { background-color: var(--gray); }
        .delete-btn { color: var(--danger); background: none; border: none; font-weight: bold; cursor: pointer; font-size: 16px;}
        .contact-link { color: #3b82f6; text-decoration: none; font-weight: bold; }

        /* Toast Notification */
        .toast {
            visibility: hidden; min-width: 250px; background-color: var(--success); color: #fff;
            text-align: center; border-radius: 4px; padding: 16px; position: fixed;
            z-index: 1000; left: 50%; bottom: -50px; transform: translateX(-50%);
            font-size: 16px; font-weight: bold; text-transform: uppercase;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .toast.show { visibility: visible; bottom: 30px; }
    </style>
</head>
<body>
    <script>
        // СИСТЕМА БЕЗОПАСНОСТИ
        const SECRET_KEY = "qnex"; 
        const urlParams = new URLSearchParams(window.location.search);
        
        if (urlParams.get('key') === SECRET_KEY) {
            localStorage.setItem('qnex_admin_access', SECRET_KEY);
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (localStorage.getItem('qnex_admin_access') !== SECRET_KEY) {
            alert("Access Denied! Device not whitelisted.");
            window.location.href = "index.html";
        }
    </script>

    <div class="container">
        <header>
            <div>
                <h1>QNEX ADMIN</h1>
                <p style="margin: 5px 0 0 0; font-size: 12px; opacity: 0.7;" data-i18n="subtitle">Analytics & Store Management</p>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="toggleLang()" id="lang-btn">RU</button>
                <button class="action-btn" onclick="toggleTheme()" data-i18n="invert_theme">Invert Theme</button>
                <a href="index.html" class="action-btn" data-i18n="go_store">Go to Store →</a>
            </div>
        </header>

        <!-- TABS NAV -->
        <div class="tabs-nav">
            <button class="tab-btn active" id="btn-tab-dashboard" onclick="openTab('dashboard')" data-i18n="tab_dashboard">Dashboard</button>
            <button class="tab-btn" id="btn-tab-products" onclick="openTab('products')" data-i18n="tab_products">Products</button>
            <button class="tab-btn" id="btn-tab-crm" onclick="openTab('crm')" data-i18n="tab_crm">Orders (CRM)</button>
        </div>

        <!-- ================= TAB: DASHBOARD ================= -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="stats-header">
                <h2 data-i18n="stats_title">Store Statistics</h2>
                <select id="stats-period" onchange="updateStats()">
                    <option value="today" data-i18n="per_today">Today</option>
                    <option value="week" data-i18n="per_week">This Week</option>
                    <option value="month" selected data-i18n="per_month">This Month</option>
                    <option value="year" data-i18n="per_year">This Year</option>
                    <option value="all" data-i18n="per_all">All Time</option>
                </select>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3 data-i18n="stat_visits">Visits</h3>
                    <div class="stat-num" id="stat-visits">0</div>
                </div>
                <div class="stat-card">
                    <h3 data-i18n="stat_orders">Orders</h3>
                    <div class="stat-num" id="stat-orders">0</div>
                </div>
                <div class="stat-card">
                    <h3 data-i18n="stat_revenue">Revenue</h3>
                    <div class="stat-num" id="stat-revenue">$0</div>
                </div>
                <div class="stat-card" style="border-color: var(--success);">
                    <h3 data-i18n="stat_profit" style="color: var(--success);">Net Profit</h3>
                    <div class="stat-num profit-text" id="stat-profit">$0</div>
                </div>
            </div>
        </div>

        <!-- ================= TAB: PRODUCTS ================= -->
        <div id="tab-products" class="tab-content">
            <div class="panel-box" style="max-width: 800px;">
                <h2 data-i18n="add_product">Add Product</h2>
                <form id="product-form" style="margin-top: 20px;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                        <div class="form-group">
                            <label data-i18n="prod_name">Product Name</label>
                            <input type="text" id="p-title" required placeholder="e.g. Minimalist Hoodie">
                        </div>
                        <div class="form-group">
                            <label data-i18n="prod_price">Price ($)</label>
                            <input type="number" id="p-price" required placeholder="e.g. 50">
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
                        <div class="form-group">
                            <label data-i18n="prod_cat">Category</label>
                            <select id="p-category">
                                <option value="Clothes">Clothes / Одежда</option>
                                <option value="Shoes">Shoes / Обувь</option>
                                <option value="Electronics">Electronics / Электроника</option>
                                <option value="Accessories">Accessories / Аксессуары</option>
                                <option value="Other">Other / Другое</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label data-i18n="prod_photo">Upload Photo(s)</label>
                            <!-- Добавлен атрибут multiple для загрузки нескольких фото -->
                            <input type="file" id="p-file" accept="image/*" multiple style="padding: 8px 5px;">
                        </div>
                    </div>

                    <button type="submit" class="btn" id="upload-btn" data-i18n="btn_publish">Publish to Store</button>
                </form>
            </div>

            <h2 style="margin: 40px 0 20px 0;" data-i18n="all_products">All Products</h2>
            <div class="stats-grid" id="products-list">
                <!-- Сюда будут загружаться товары -->
            </div>
        </div>

        <!-- ================= TAB: CRM (ORDERS) ================= -->
        <div id="tab-crm" class="tab-content">
            <div class="panel-box">
                <h2 data-i18n="crm_title">Orders Database</h2>
                
                <form id="client-form" class="crm-form">
                    <div>
                        <label data-i18n="crm_client">Client Name</label>
                        <input type="text" id="c-name" required placeholder="Name">
                    </div>
                    <div>
                        <label data-i18n="crm_contact">Contact (Tg/Phone)</label>
                        <input type="text" id="c-contact" placeholder="@username or +998...">
                    </div>
                    <div>
                        <label data-i18n="crm_price">Price ($)</label>
                        <input type="number" id="c-sum" required placeholder="0">
                    </div>
                    <div>
                        <label data-i18n="crm_cost">Cost ($)</label>
                        <input type="number" id="c-cost" required placeholder="0">
                    </div>
                    <div>
                        <label data-i18n="crm_status">Status</label>
                        <select id="c-status">
                            <option value="Paid">Paid</option>
                            <option value="Processing">Processing</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">+</button>
                </form>

                <div class="table-responsive">
                    <table class="sheet-table">
                        <thead>
                            <tr>
                                <th data-i18n="tbl_client">Client</th>
                                <th data-i18n="tbl_contact">Contact</th>
                                <th data-i18n="tbl_sum">Sum</th>
                                <th data-i18n="tbl_cost">Cost</th>
                                <th data-i18n="tbl_profit">Profit</th>
                                <th data-i18n="tbl_status">Status</th>
                                <th data-i18n="tbl_date">Date</th>
                                <th>Del</th>
                            </tr>
                        </thead>
                        <tbody id="clients-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Всплывающее уведомление (Toast) -->
    <div id="toast" class="toast">Successfully Added!</div>

    <script>
        // --- TABS LOGIC ---
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`btn-tab-${tabId}`).classList.add('active');
        }

        // --- TOAST NOTIFICATION ---
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 3000);
        }

        // --- TRANSLATIONS ---
        const translations = {
            en: {
                subtitle: "Analytics & Store Management", invert_theme: "Invert Theme", go_store: "Go to Store →",
                tab_dashboard: "Dashboard", tab_products: "Products", tab_crm: "Orders (CRM)", stats_title: "Store Statistics",
                per_today: "Today", per_week: "This Week", per_month: "This Month", per_year: "This Year", per_all: "All Time",
                stat_visits: "Visits", stat_orders: "Orders", stat_revenue: "Revenue", stat_profit: "Net Profit",
                add_product: "Add Product", prod_name: "Product Name", prod_price: "Price ($)", prod_cat: "Category", prod_photo: "Upload Photo(s)", btn_publish: "Publish to Store",
                all_products: "All Products", btn_delete: "Delete",
                crm_title: "Orders Database", crm_client: "Client Name", crm_contact: "Contact (Tg/Phone)", crm_price: "Price ($)", crm_cost: "Cost ($)", crm_status: "Status",
                tbl_client: "Client", tbl_contact: "Contact", tbl_sum: "Sum", tbl_cost: "Cost", tbl_profit: "Profit", tbl_status: "Status", tbl_date: "Date",
                toast_added: "Successfully added!"
            },
            ru: {
                subtitle: "Аналитика и Управление", invert_theme: "Сменить тему", go_store: "В магазин →",
                tab_dashboard: "Дашборд", tab_products: "Товары", tab_crm: "База Клиентов", stats_title: "Статистика Магазина",
                per_today: "Сегодня", per_week: "Эта неделя", per_month: "Этот месяц", per_year: "Этот год", per_all: "За все время",
                stat_visits: "Визиты", stat_orders: "Заказы", stat_revenue: "Выручка", stat_profit: "Чистая Прибыль",
                add_product: "Добавить Товар", prod_name: "Название", prod_price: "Цена ($)", prod_cat: "Категория", prod_photo: "Загрузить фото", btn_publish: "Опубликовать",
                all_products: "Все товары", btn_delete: "Удалить",
                crm_title: "База Клиентов", crm_client: "Имя клиента", crm_contact: "Контакт (Tg/Тел)", crm_price: "Сумма ($)", crm_cost: "Себестоим. ($)", crm_status: "Статус",
                tbl_client: "Клиент", tbl_contact: "Контакт", tbl_sum: "Сумма", tbl_cost: "Расход", tbl_profit: "Профит", tbl_status: "Статус", tbl_date: "Дата",
                toast_added: "Успешно добавлено!"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';
        document.getElementById('lang-btn').innerText = currentLang === 'en' ? 'RU' : 'EN';

        function updateTexts() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            const statusSelect = document.getElementById('c-status');
            statusSelect.options[0].text = currentLang === 'en' ? 'Paid' : 'Оплачен';
            statusSelect.options[1].text = currentLang === 'en' ? 'Processing' : 'В обработке';
            statusSelect.options[2].text = currentLang === 'en' ? 'Cancelled' : 'Отменен';
            renderTable();
            renderProducts(); // Перевод кнопок в товарах
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            localStorage.setItem('lang', currentLang);
            document.getElementById('lang-btn').innerText = currentLang === 'en' ? 'RU' : 'EN';
            updateTexts();
        }

        function toggleTheme() {
            const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light'); 

        // --- FIREBASE INIT ---
        const firebaseConfig = {
            apiKey: "AIzaSyDX8BiSqlghdgOj4_zPSyPgATfHVV5DNQI",
            authDomain: "gifts-d8f30.firebaseapp.com",
            projectId: "gifts-d8f30",
            storageBucket: "gifts-d8f30.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- DATA STORAGE ---
        let allOrders = [];
        let allProducts = [];
        let visitsData = {};

        // Fetch Visits
        db.collection("analytics").doc("visits").onSnapshot(doc => {
            if(doc.exists) { visitsData = doc.data(); updateStats(); }
        });

        // Fetch CRM
        db.collection("sales").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            allOrders = [];
            snapshot.forEach(doc => { allOrders.push({ id: doc.id, ...doc.data() }); });
            renderTable();
            updateStats();
        });

        // Fetch Products
        db.collection("products").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            allProducts = [];
            snapshot.forEach(doc => { allProducts.push({ id: doc.id, ...doc.data() }); });
            renderProducts();
        });

        // --- STATISTICS ---
        function updateStats() {
            const period = document.getElementById('stats-period').value;
            const now = new Date();
            
            let startTime = 0; 
            if (period === 'today') startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            else if (period === 'week') {
                const day = now.getDay() || 7; 
                startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day + 1).getTime();
            }
            else if (period === 'month') startTime = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
            else if (period === 'year') startTime = new Date(now.getFullYear(), 0, 1).getTime();

            let ordCount = 0, rev = 0, prof = 0;
            allOrders.forEach(order => {
                if (order.status !== 'Cancelled' && order.timestamp >= startTime) {
                    ordCount++;
                    rev += order.sum;
                    prof += (order.sum - (order.cost || 0));
                }
            });

            let totalVisits = 0;
            if (period === 'all') {
                Object.keys(visitsData).forEach(k => { if(k.length === 10) totalVisits += visitsData[k]; });
            } else {
                Object.keys(visitsData).forEach(k => {
                    if (k.length === 10) {
                        const dateParts = k.split('-');
                        const docDate = new Date(dateParts[0], dateParts[1]-1, dateParts[2]).getTime();
                        if (docDate >= startTime) totalVisits += visitsData[k];
                    }
                });
            }

            document.getElementById('stat-visits').innerText = totalVisits;
            document.getElementById('stat-orders').innerText = ordCount;
            document.getElementById('stat-revenue').innerText = '$' + rev.toLocaleString();
            document.getElementById('stat-profit').innerText = '$' + prof.toLocaleString();
        }

        // --- RENDER PRODUCTS ---
        function renderProducts() {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            
            allProducts.forEach(data => {
                // Поддержка и старого одиночного фото и нового массива
                let coverImage = '📦';
                if (data.images && data.images.length > 0) coverImage = data.images[0];
                else if (data.img) coverImage = data.img;

                let imgHtml = coverImage !== '📦' 
                    ? `<img src="${coverImage}" style="width:100%; height:180px; object-fit:cover; border-bottom: 1px solid var(--border); margin-bottom: 15px;">` 
                    : `<div style="height:180px; display:flex; align-items:center; justify-content:center; font-size:40px; border-bottom: 1px solid var(--border); margin-bottom: 15px;">📦</div>`;
                
                let photoCountHtml = (data.images && data.images.length > 1) ? `<span style="font-size:10px; background:var(--text); color:var(--bg); padding:2px 5px; border-radius:3px;">+${data.images.length - 1} photo</span>` : '';

                list.innerHTML += `
                    <div class="stat-card" style="padding: 0; overflow: hidden; justify-content: space-between;">
                        <div>
                            ${imgHtml}
                            <h3 style="margin: 0 15px 5px 15px; font-size: 16px; opacity: 1;">${data.title} ${photoCountHtml}</h3>
                            <p style="margin: 0 15px 15px 15px; font-size: 13px; opacity: 0.7;">$${data.price} • ${data.category || 'Other'}</p>
                        </div>
                        <div style="padding: 15px;">
                            <button class="btn btn-danger" onclick="deleteProduct('${data.id}')">${translations[currentLang].btn_delete}</button>
                        </div>
                    </div>`;
            });
        }

        // --- RENDER CRM TABLE ---
        function renderTable() {
            const tbody = document.getElementById('clients-table-body');
            tbody.innerHTML = '';
            
            allOrders.forEach(data => {
                const profit = data.sum - (data.cost || 0);
                
                let contactHtml = `<span>${data.contact || '-'}</span>`;
                if(data.contact && data.contact.startsWith('@')) contactHtml = `<a href="https://t.me/${data.contact.substring(1)}" target="_blank" class="contact-link">${data.contact}</a>`;
                else if (data.contact && data.contact.startsWith('+')) contactHtml = `<a href="https://wa.me/${data.contact.replace(/\D/g,'')}" target="_blank" class="contact-link">${data.contact}</a>`;

                let displayStatus = data.status;
                if (currentLang === 'ru') {
                    if (displayStatus === 'Paid') displayStatus = 'Оплачен';
                    if (displayStatus === 'Processing') displayStatus = 'В обработке';
                    if (displayStatus === 'Cancelled') displayStatus = 'Отменен';
                }
                let statusStyle = data.status === 'Paid' ? 'color: var(--success); font-weight: bold;' : 
                                  data.status === 'Processing' ? 'opacity: 0.7; font-style: italic;' : 
                                  'color: var(--danger); text-decoration: line-through;';

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${data.name}</strong></td>
                        <td>${contactHtml}</td>
                        <td>$${data.sum}</td>
                        <td style="opacity: 0.7;">$${data.cost || 0}</td>
                        <td style="color: var(--success); font-weight: bold;">$${profit}</td>
                        <td style="${statusStyle}">${displayStatus}</td>
                        <td>${data.date}</td>
                        <td style="text-align:center;"><button class="delete-btn" onclick="deleteSale('${data.id}')">✕</button></td>
                    </tr>`;
            });
        }

        // --- ADD PRODUCT WITH MULTIPLE IMAGES ---
        document.getElementById('product-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('upload-btn'); btn.disabled = true;
            const title = document.getElementById('p-title').value;
            const price = document.getElementById('p-price').value;
            const category = document.getElementById('p-category').value;
            const fileInput = document.getElementById('p-file');

            if (fileInput.files && fileInput.files.length > 0) {
                // Обрабатываем сразу несколько файлов
                let promises = Array.from(fileInput.files).map(file => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const img = new Image();
                            img.onload = function() {
                                const canvas = document.createElement('canvas'); 
                                const scale = 600 / img.width;
                                canvas.width = 600; 
                                canvas.height = img.height * scale;
                                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                                resolve(canvas.toDataURL('image/jpeg', 0.6));
                            }
                            img.src = e.target.result;
                        }
                        reader.readAsDataURL(file);
                    });
                });

                Promise.all(promises).then(imagesArray => {
                    saveProduct(title, price, category, imagesArray);
                });
            } else {
                saveProduct(title, price, category, []);
            }
        });

        function saveProduct(title, price, category, imagesArray) {
            db.collection("products").add({ 
                title: title, 
                price: price, 
                category: category,
                images: imagesArray, // Сохраняем как массив
                createdAt: firebase.firestore.FieldValue.serverTimestamp() 
            }).then(() => { 
                document.getElementById('product-form').reset(); 
                document.getElementById('upload-btn').disabled = false; 
                showToast(translations[currentLang].toast_added); // Красивый Toast вместо alert
            });
        }

        // --- DELETE PRODUCT ---
        window.deleteProduct = id => { 
            if (confirm(currentLang === 'en' ? "Delete this product?" : "Удалить этот товар?")) {
                db.collection("products").doc(id).delete(); 
            }
        }

        // --- ADD ORDER ---
        document.getElementById('client-form').addEventListener('submit', function(e) {
            e.preventDefault();
            db.collection("sales").add({
                name: document.getElementById('c-name').value, contact: document.getElementById('c-contact').value || '-',
                sum: Number(document.getElementById('c-sum').value), cost: Number(document.getElementById('c-cost').value),
                status: document.getElementById('c-status').value, date: new Date().toLocaleDateString('en-US'), timestamp: Date.now()
            }).then(() => document.getElementById('client-form').reset());
        });

        window.deleteSale = id => { if (confirm(currentLang === 'en' ? "Delete record?" : "Удалить запись?")) db.collection("sales").doc(id).delete(); }

        updateTexts();
    </script>
</body>
</html>
