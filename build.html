<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Конструктор луков — Qnex Style</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
  :root {
    --bg: #ffffff; 
    --bg-panel: #ffffff;
    --ink: #111111;
    --ink-soft: #888888;
    --line: #ebebeb; 
    --danger: #ff4757;
    --accent: #2f3542;
    
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; height: 100%; }
  
  body { 
    margin: 0; 
    background: var(--bg); 
    color: var(--ink); 
    font-family: var(--font-body); 
    padding: 40px 20px 80px; 
    min-height: 100vh;
  }
  
  .app { max-width: 1100px; margin: 0 auto; animation: fadeUp 0.6s ease-out; }

  /* АНИМАЦИИ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  @keyframes clothPop {
    0% { transform: scale(0.9); opacity: 0; }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ШАПКА */
  .tag-bar { text-align: center; margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px;}
  .tag-bar h1 { font-family: var(--font-display); font-size: clamp(40px, 8vw, 72px); margin: 0; letter-spacing: 2px; }

  /* УЛУЧШЕННАЯ КНОПКА */
  .btn-randomize { 
    background: linear-gradient(135deg, var(--ink), var(--accent));
    color: #fff;
    border: none;
    padding: 16px 32px;
    border-radius: 50px;
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 10px 20px rgba(17, 17, 17, 0.2);
  }
  .btn-randomize:hover { 
    transform: translateY(-4px) scale(1.02); 
    box-shadow: 0 15px 25px rgba(17, 17, 17, 0.3);
  }
  .btn-randomize:active {
    transform: translateY(2px) scale(0.98);
    box-shadow: 0 5px 10px rgba(17, 17, 17, 0.2);
  }

  /* СЕТКА */
  .stage-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 40px; align-items: start; }

  /* КАРТОЧКИ */
  .stage-card, .admin-card {
    background: var(--bg-panel);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.04); 
    border: 1px solid var(--line);
  }

  /* ЗОНА МАНЕКЕНА */
  .stage-container { position: relative; }

  .stage {
    display: flex; align-items: center; justify-content: center;
    min-height: 900px; height: 75vh; max-height: 950px; 
    position: relative;
    background-color: #ffffff;
    border: 1px solid var(--line);
    border-radius: 16px; 
    margin-bottom: 24px;
    padding: 20px; 
    overflow: hidden;
  }

  /* СТРЕЛКИ УПРАВЛЕНИЯ */
  .layer-controls {
    position: absolute; width: 100%; display: flex; justify-content: space-between;
    padding: 0 16px; z-index: 10; pointer-events: none;
  }
  .layer-controls button {
    pointer-events: auto; width: 48px; height: 48px; border-radius: 50%;
    border: none; background: rgba(255,255,255,0.9); color: var(--ink);
    font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; box-shadow: 0 8px 16px rgba(0,0,0,0.08);
    backdrop-filter: blur(4px);
  }
  .layer-controls button:hover { 
    background: var(--ink); color: #fff; 
    transform: scale(1.15); 
  }
  .layer-controls button:active { transform: scale(0.95); }

  /* СЛОИ ОДЕЖДЫ */
  .clothing-layers { position: relative; width: min(340px, 70vw); height: 100%; max-height: 850px; margin: 0 auto; }
  /* Тени убраны по вашей просьбе */
  .clothing-layer { position: absolute; width: 100%; height: 100%; object-fit: contain; left: 0; }
  .animate-pop { animation: clothPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

  #layer-top { z-index: 3; top: 16%; height: 40%; }
  #layer-bottom { z-index: 2; top: 50%; height: 34%; }
  #layer-shoes { z-index: 1; top: 86%; height: 22%; }

  .current-item { text-align: center; font-family: var(--font-mono); font-size: 14px; color: var(--ink-soft); margin: 24px 0; background: #f4f5f7; padding: 12px; border-radius: 12px; }
  .current-item b { color: var(--ink); font-weight: 700; font-size: 15px; }

  /* ПОЛОСА ТОВАРОВ */
  .thumb-strip { 
    display: flex; 
    gap: 32px; /* Расстояние увеличено */
    overflow-x: auto; padding: 12px 4px 24px; -webkit-overflow-scrolling: touch; 
    scrollbar-width: none;
  }
  .thumb-strip::-webkit-scrollbar { display: none; }
  
  .thumb {
    width: 56px; height: 56px; /* Товары стали меньше */
    border-radius: 12px; 
    background-size: cover; background-position: center; cursor: pointer;
    background-color: #f4f5f7; flex-shrink: 0; 
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    opacity: 0.6; filter: grayscale(50%);
    border: 2px solid transparent;
  }
  .thumb:hover { opacity: 1; filter: grayscale(0%); transform: translateY(-4px); }
  .thumb.selected { 
    opacity: 1; filter: grayscale(0%);
    border-color: var(--ink); 
    transform: scale(1.05) translateY(-4px);
    /* Тени убраны по вашей просьбе */
  }

  /* ПАНЕЛЬ АДМИНА */
  .admin-card { position: sticky; top: 40px; }
  .admin-card h3 { font-family: var(--font-display); font-size: 32px; margin-top: 0; letter-spacing: 1.5px; margin-bottom: 8px;}
  .admin-desc { font-family: var(--font-mono); font-size: 13px; color: var(--ink-soft); margin-bottom: 32px; }
  .admin-form { display: flex; flex-direction: column; gap: 16px; font-family: var(--font-mono); font-size: 14px; }
  
  .admin-form input, .admin-form select { 
    padding: 16px 20px; background: #f8f9fa; border: 1px solid var(--line); color: var(--ink);
    border-radius: 12px; width: 100%; font-family: inherit; font-size: 14px; outline: none; transition: 0.3s;
  }
  .admin-form input:focus, .admin-form select:focus { 
    background: #ffffff;
    border-color: var(--ink); 
    box-shadow: 0 0 0 4px rgba(17,17,17,0.05); 
  }
  
  .btn-group { display: flex; gap: 12px; margin-top: 8px; }
  .admin-form button { 
    padding: 16px; border: none; border-radius: 12px; cursor: pointer; 
    font-family: inherit; font-weight: bold; font-size: 13px; text-transform: uppercase; flex: 1; 
    transition: all 0.2s;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
  
  .btn-secondary { background: transparent; color: var(--ink); border: 2px solid var(--ink) !important; padding: 14px; }
  .btn-secondary:hover { background: var(--ink); color: #fff; transform: translateY(-2px); }

  .btn-danger { background: rgba(255, 71, 87, 0.05); color: var(--danger); border: 1px dashed var(--danger) !important; margin-top: 8px; }
  .btn-danger:hover { background: var(--danger); color: #fff; border-style: solid !important;}

  /* ПАНЕЛЬ "ВАШ ОБРАЗ" */
  .look-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .look-row { display: flex; align-items: center; gap: 14px; padding: 10px; background: #f8f9fa; border-radius: 12px; }
  .look-thumb { width: 46px; height: 46px; border-radius: 10px; background-size: cover; background-position: center; background-color: #fff; border: 1px solid var(--line); flex-shrink: 0; }
  .look-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .look-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .look-price { font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); }
  .look-empty { font-family: var(--font-mono); font-size: 13px; color: var(--ink-soft); text-align: center; padding: 20px 0; margin: 0; }
  .look-total { font-family: var(--font-mono); font-weight: 700; font-size: 18px; text-align: right; margin-bottom: 20px; color: var(--ink); min-height: 24px; }
  .btn-order {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 16px; border: none; border-radius: 12px; cursor: pointer;
    font-family: var(--font-mono); font-weight: bold; font-size: 13px; text-transform: uppercase;
    text-decoration: none; background: var(--ink); color: #fff; transition: all 0.2s;
  }
  .btn-order:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
  .btn-order.disabled { opacity: 0.4; pointer-events: none; }
  .catalog-note { font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); text-align: center; margin-top: 16px; line-height: 1.6; }

  /* АДАПТИВ */
  @media (max-width: 992px) {
    .stage-grid { grid-template-columns: 1fr; gap: 32px; }
    .admin-card { position: static; }
    .stage { min-height: 700px; }
  }

  @media (max-width: 768px) {
    body { padding: 24px 12px 60px; }
    .stage-card, .admin-card { padding: 24px; border-radius: 20px; }
    
    .stage { min-height: 550px; height: 65vh; max-height: 750px; padding: 10px; margin-bottom: 24px; }
    .thumb { width: 50px; height: 50px; }
    
    .btn-group { flex-direction: column; }
    .btn-randomize { padding: 14px 24px; font-size: 13px; }

    .layer-controls button { width: 40px; height: 40px; font-size: 20px; }
  }

  @media (max-width: 400px) {
    .stage { min-height: 480px; height: 60vh; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="tag-bar">
    <h1>QNEX BUILDER</h1>
    <button class="btn-randomize" onclick="randomizeLook()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
      Собрать случайно
    </button>
  </header>

  <div class="stage-grid">
    <section class="stage-card">

      <div class="stage-container">
        <div class="stage" id="stage">
          
          <div class="layer-controls" style="top: 25%;">
            <button onclick="cycle('top', -1)">‹</button>
            <button onclick="cycle('top', 1)">›</button>
          </div>
          <div class="layer-controls" style="top: 55%;">
            <button onclick="cycle('bottom', -1)">‹</button>
            <button onclick="cycle('bottom', 1)">›</button>
          </div>
          <div class="layer-controls" style="top: 85%;">
            <button onclick="cycle('shoes', -1)">‹</button>
            <button onclick="cycle('shoes', 1)">›</button>
          </div>

          <div class="clothing-layers" id="clothingLayers">
              <img id="layer-top" class="clothing-layer" src="" alt="Верх">
              <img id="layer-bottom" class="clothing-layer" src="" alt="Низ">
              <img id="layer-shoes" class="clothing-layer" src="" alt="Обувь">
          </div>
        </div>
      </div>

      <p class="current-item" id="currentItem"></p>
      <div class="thumb-strip" id="thumbStrip"></div>
    </section>

    <aside class="admin-card">
      <h3>ВАШ ОБРАЗ</h3>
      <p class="admin-desc" id="loadStatus">Загрузка каталога…</p>

      <div class="look-list" id="lookList"></div>
      <div class="look-total" id="lookTotal"></div>
      <a class="btn-order disabled" id="btnOrder" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Заказать образ в Telegram
      </a>
      <p class="catalog-note">Все товары берутся напрямую из каталога Qnex Shop в реальном времени.</p>
    </aside>

  </div>
</div>

<script>
// ================= FIREBASE (та же база, что и у каталога Qnex Shop) =================
const firebaseConfig = {
  apiKey: "AIzaSyDX8BiSqlghdgOj4_zPSyPgATfHVV5DNQI",
  authDomain: "gifts-d8f30.firebaseapp.com",
  projectId: "gifts-d8f30"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= ССЫЛКА ДЛЯ ЗАКАЗА — тот же телеграм, что в каталоге =================
const TELEGRAM_USERNAME = 'qnex_shop';

// ================= СЛОТЫ МАНЕКЕНА =================
// Аксессуары убраны
const CATEGORIES = [
  { key: 'top',    label: 'Верх' },
  { key: 'bottom', label: 'Низ' },
  { key: 'shoes',  label: 'Обувь' },
];
const NONE_IMG = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
const EMPTY_ITEMS = () => ({
  top:    [{ id: 't0', name: 'Без верха',            image: NONE_IMG }],
  bottom: [{ id: 'b0', name: 'Без низа',              image: NONE_IMG }],
  shoes:  [{ id: 's0', name: 'Без обуви',             image: NONE_IMG }]
});

// Категории каталога
const DEFAULT_CATALOG_CATEGORIES = [
  { key: 'hoodie', ru: 'Худи', en: 'Hoodies' },
  { key: 't-shirt', ru: 'Футболки', en: 'T-Shirts' },
  { key: 'pants', ru: 'Штаны', en: 'Pants' }
];
let customCatalogCategories = [];
function getAllCatalogCategories() { return [...DEFAULT_CATALOG_CATEGORIES, ...customCatalogCategories]; }

// ============================================================================
// УЛУЧШЕННАЯ КАРТА "категория каталога/название -> слот манекена"
// ============================================================================
const SLOT_KEYWORDS = {
  shoes:  ['обув', 'shoe', 'кроссов', 'sneaker', 'ботин', 'boot', 'туфл', 'кед'],
  bottom: ['штан', 'pant', 'джинс', 'jean', 'шорт', 'short', 'брюк', 'юбк', 'skirt', 'джоггер', 'треник'],
  top:    ['худи', 'hoodie', 'футбол', 't-shirt', 'рубаш', 'shirt', 'куртк', 'jacket', 'свитш', 'sweat', 'верх', 'лонгслив', 'зип', 'свитер', 'толстовк']
};

function detectSlot(categoryKey, title = '') {
  const cat = getAllCatalogCategories().find(c => c.key === categoryKey);
  // Проверяем и категорию, и само название вещи
  const haystack = [categoryKey || '', cat ? cat.ru : '', cat ? cat.en : '', title || ''].join(' ').toLowerCase();
  
  for (const slot of Object.keys(SLOT_KEYWORDS)) {
    if (SLOT_KEYWORDS[slot].some(kw => haystack.includes(kw))) return slot;
  }
  
  // Если товар не подошел ни под одну категорию верха, низа или обуви (например, это брелок) — он отбрасывается
  return null; 
}

let ITEMS = EMPTY_ITEMS();
let selected = { top: 0, bottom: 0, shoes: 0 };
let active = 'top';
let dataLoaded = false;
let latestProducts = [];

const $ = (sel) => document.querySelector(sel);

// --- ЛОКАЛЬНЫЙ КЭШ ---
const CACHE_KEY = 'qnex_products_cache_v1';
function loadProductsCache() {
  try { const raw = localStorage.getItem(CACHE_KEY); if (raw) return JSON.parse(raw); }
  catch (e) { console.warn('Cache read failed', e); }
  return null;
}

function rebuildItemsFromProducts(products) {
  const base = EMPTY_ITEMS();
  products.forEach(p => {
    const img = (p.images && p.images.length > 0) ? p.images[0] : (p.img || null);
    if (!img) return;
    
    // Получаем слот, проверяя также название товара
    const slot = detectSlot(p.category, p.title);
    
    // Добавляем только если товар был четко распознан
    if (slot && base[slot]) {
      base[slot].push({ id: p.id, name: p.title || 'Без названия', image: img, price: p.price || '0' });
    }
  });
  
  ITEMS = base;
  Object.keys(selected).forEach(k => { if (selected[k] >= ITEMS[k].length) selected[k] = 0; });
}

function tryRebuild() {
  rebuildItemsFromProducts(latestProducts);
  renderAll();
}

function randomizeLook() {
  CATEGORIES.forEach(c => {
    let min = ITEMS[c.key].length > 1 ? 1 : 0;
    selected[c.key] = Math.floor(Math.random() * (ITEMS[c.key].length - min)) + min;
  });
  renderAll();
}

function renderAll() {
  renderThumbs();
  renderStage();
  renderLookPanel();
}

function renderThumbs() {
  if (!dataLoaded) {
    $('#thumbStrip').innerHTML = `<span style="font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);">Загрузка товаров из каталога…</span>`;
    return;
  }
  $('#thumbStrip').innerHTML = ITEMS[active].map((item, i) =>
    `<div class="thumb ${i === selected[active] ? 'selected' : ''}" data-i="${i}" style="background-image: url('${item.image}')" title="${item.name}"></div>`
  ).join('');
  document.querySelectorAll('.thumb').forEach(btn => {
    btn.addEventListener('click', () => { selected[active] = Number(btn.dataset.i); renderAll(); });
  });
}

function renderStage() {
  CATEGORIES.forEach(c => {
    const i = ITEMS[c.key][selected[c.key]];
    const imgEl = $('#layer-' + c.key);

    if (i && imgEl.src !== i.image) {
      imgEl.src = i.image;
      imgEl.classList.remove('animate-pop');
      void imgEl.offsetWidth;
      imgEl.classList.add('animate-pop');
    }
  });

  const cur = ITEMS[active][selected[active]];
  if (cur) {
    const lbl = CATEGORIES.find(c => c.key === active).label;
    $('#currentItem').innerHTML = `${lbl.toUpperCase()}: <b>${cur.name}</b>`;
  }
}

function cycle(cat, dir) {
  const l = ITEMS[cat];
  selected[cat] = (selected[cat] + dir + l.length) % l.length;
  active = cat;
  renderAll();
}

function renderLookPanel() {
  $('#loadStatus').innerText = dataLoaded
    ? 'Выберите вещи стрелками или кликом по товарам ниже.'
    : 'Загрузка каталога…';

  const chosen = CATEGORIES
    .map(c => ITEMS[c.key][selected[c.key]])
    .filter(item => item && item.image !== NONE_IMG);

  $('#lookList').innerHTML = chosen.length
    ? chosen.map(item => `
        <div class="look-row">
          <div class="look-thumb" style="background-image:url('${item.image}')"></div>
          <div class="look-info">
            <span class="look-name">${item.name}</span>
            <span class="look-price">$ ${item.price || '0'}</span>
          </div>
        </div>`).join('')
    : `<p class="look-empty">Соберите образ — выбранные вещи появятся здесь</p>`;

  const total = chosen.reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);
  $('#lookTotal').innerText = chosen.length ? `Итого: $ ${total.toFixed(2)}` : '';

  const btn = $('#btnOrder');
  if (chosen.length) {
    const lines = chosen.map(item => `${item.name} — $${item.price || '0'}`).join('\n');
    const msg = `Здравствуйте! Хочу заказать образ:\n${lines}\nИтого: $${total.toFixed(2)}`;
    btn.href = `https://t.me/${TELEGRAM_USERNAME}?text=${encodeURIComponent(msg)}`;
    btn.classList.remove('disabled');
  } else {
    btn.href = '#';
    btn.classList.add('disabled');
  }
}

// --- ЗАГРУЗКА ИЗ FIRESTORE ---
const cachedProducts = loadProductsCache();
if (cachedProducts && cachedProducts.length) {
  latestProducts = cachedProducts;
  dataLoaded = true;
  rebuildItemsFromProducts(latestProducts);
}
renderAll();

db.collection('categories').orderBy('createdAt', 'asc').onSnapshot(
  (snapshot) => {
    customCatalogCategories = [];
    snapshot.forEach(doc => customCatalogCategories.push({ id: doc.id, ...doc.data() }));
    tryRebuild();
  },
  (err) => console.warn('Categories listener error:', err)
);

db.collection('products').orderBy('createdAt', 'desc').onSnapshot(
  (snapshot) => {
    const fresh = [];
    snapshot.forEach(doc => fresh.push({ id: doc.id, ...doc.data() }));
    latestProducts = fresh;
    dataLoaded = true;
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(fresh)); } catch (e) {}
    tryRebuild();
  },
  (err) => {
    console.warn('Products listener error:', err);
    $('#loadStatus').innerText = 'Не удалось загрузить каталог. Проверьте соединение.';
  }
);
</script>
</body>
</html>
