<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Конструктор луков — Qnex Style</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
  :root {
    --bg: #f4f5f7; 
    --bg-panel: #ffffff;
    --ink: #111111;
    --ink-soft: #888888;
    --line: #e2e4e8; 
    --danger: #ff4757;
    --accent: #2f3542;
    
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; height: 100%; }
  
  body { 
    margin: 0; 
    background: var(--bg); 
    color: var(--ink); 
    font-family: var(--font-body); 
    padding: 40px 20px 80px; 
    min-height: 100vh;
  }
  
  .app { max-width: 1100px; margin: 0 auto; animation: fadeUp 0.6s ease-out; }

  /* АНИМАЦИИ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  @keyframes clothPop {
    0% { transform: scale(0.9); opacity: 0; }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ШАПКА */
  .tag-bar { text-align: center; margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px;}
  .tag-bar h1 { font-family: var(--font-display); font-size: clamp(40px, 8vw, 72px); margin: 0; letter-spacing: 2px; }

  /* УЛУЧШЕННАЯ КНОПКА */
  .btn-randomize { 
    background: linear-gradient(135deg, var(--ink), var(--accent));
    color: #fff;
    border: none;
    padding: 16px 32px;
    border-radius: 50px;
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 10px 20px rgba(17, 17, 17, 0.2);
  }
  .btn-randomize:hover { 
    transform: translateY(-4px) scale(1.02); 
    box-shadow: 0 15px 25px rgba(17, 17, 17, 0.3);
  }
  .btn-randomize:active {
    transform: translateY(2px) scale(0.98);
    box-shadow: 0 5px 10px rgba(17, 17, 17, 0.2);
  }

  /* СЕТКА */
  .stage-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 40px; align-items: start; }

  /* КАРТОЧКИ */
  .stage-card, .admin-card {
    background: var(--bg-panel);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.04); 
    border: 1px solid rgba(255,255,255,0.5);
  }

  /* ЗОНА МАНЕКЕНА */
  .stage-container { position: relative; }

  .stage {
    display: flex; align-items: center; justify-content: center;
    min-height: 900px; height: 75vh; max-height: 950px; 
    position: relative;
    background-color: #fafafa;
    /* Сетка на фоне для стиля "конструктора" */
    background-image: radial-gradient(var(--line) 2px, transparent 2px);
    background-size: 24px 24px;
    border-radius: 16px; 
    margin-bottom: 24px;
    padding: 20px; 
    overflow: hidden;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.02);
  }

  /* СТРЕЛКИ УПРАВЛЕНИЯ */
  .layer-controls {
    position: absolute; width: 100%; display: flex; justify-content: space-between;
    padding: 0 16px; z-index: 10; pointer-events: none;
  }
  .layer-controls button {
    pointer-events: auto; width: 48px; height: 48px; border-radius: 50%;
    border: none; background: rgba(255,255,255,0.9); color: var(--ink);
    font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; box-shadow: 0 8px 16px rgba(0,0,0,0.08);
    backdrop-filter: blur(4px);
  }
  .layer-controls button:hover { 
    background: var(--ink); color: #fff; 
    transform: scale(1.15); 
  }
  .layer-controls button:active { transform: scale(0.95); }

  /* СЛОИ ОДЕЖДЫ */
  .clothing-layers { position: relative; width: min(340px, 70vw); height: 100%; max-height: 850px; margin: 0 auto; }
  .clothing-layer { position: absolute; width: 100%; height: 100%; object-fit: contain; left: 0; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15)); }
  .animate-pop { animation: clothPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

  #layer-head { z-index: 4; top: 0%; height: 20%; }
  #layer-top { z-index: 3; top: 16%; height: 40%; }
  #layer-bottom { z-index: 2; top: 50%; height: 34%; }
  #layer-shoes { z-index: 1; top: 86%; height: 22%; }

  .current-item { text-align: center; font-family: var(--font-mono); font-size: 14px; color: var(--ink-soft); margin: 24px 0; background: #f4f5f7; padding: 12px; border-radius: 12px; }
  .current-item b { color: var(--ink); font-weight: 700; font-size: 15px; }

  /* ПОЛОСА ТОВАРОВ */
  .thumb-strip { 
    display: flex; gap: 16px; 
    overflow-x: auto; padding: 12px 4px 24px; -webkit-overflow-scrolling: touch; 
    scrollbar-width: none; /* скрываем скроллбар для эстетики */
  }
  .thumb-strip::-webkit-scrollbar { display: none; }
  
  .thumb {
    width: 72px; height: 72px; 
    border-radius: 16px; 
    background-size: cover; background-position: center; cursor: pointer;
    background-color: #f4f5f7; flex-shrink: 0; 
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    opacity: 0.6; filter: grayscale(50%);
    border: 2px solid transparent;
  }
  .thumb:hover { opacity: 1; filter: grayscale(0%); transform: translateY(-4px); }
  .thumb.selected { 
    opacity: 1; filter: grayscale(0%);
    border-color: var(--ink); 
    transform: scale(1.05) translateY(-4px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
  }

  /* ПАНЕЛЬ АДМИНА */
  .admin-card { position: sticky; top: 40px; }
  .admin-card h3 { font-family: var(--font-display); font-size: 32px; margin-top: 0; letter-spacing: 1.5px; margin-bottom: 8px;}
  .admin-desc { font-family: var(--font-mono); font-size: 13px; color: var(--ink-soft); margin-bottom: 32px; }
  .admin-form { display: flex; flex-direction: column; gap: 16px; font-family: var(--font-mono); font-size: 14px; }
  
  .admin-form input, .admin-form select { 
    padding: 16px 20px; background: #f8f9fa; border: 1px solid var(--line); color: var(--ink);
    border-radius: 12px; width: 100%; font-family: inherit; font-size: 14px; outline: none; transition: 0.3s;
  }
  .admin-form input:focus, .admin-form select:focus { 
    background: #ffffff;
    border-color: var(--ink); 
    box-shadow: 0 0 0 4px rgba(17,17,17,0.05); 
  }
  
  .btn-group { display: flex; gap: 12px; margin-top: 8px; }
  .admin-form button { 
    padding: 16px; border: none; border-radius: 12px; cursor: pointer; 
    font-family: inherit; font-weight: bold; font-size: 13px; text-transform: uppercase; flex: 1; 
    transition: all 0.2s;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
  
  .btn-secondary { background: transparent; color: var(--ink); border: 2px solid var(--ink) !important; padding: 14px; }
  .btn-secondary:hover { background: var(--ink); color: #fff; transform: translateY(-2px); }

  .btn-danger { background: rgba(255, 71, 87, 0.05); color: var(--danger); border: 1px dashed var(--danger) !important; margin-top: 8px; }
  .btn-danger:hover { background: var(--danger); color: #fff; border-style: solid !important;}


  /* АДАПТИВ */
  @media (max-width: 992px) {
    .stage-grid { grid-template-columns: 1fr; gap: 32px; }
    .admin-card { position: static; }
    .stage { min-height: 700px; }
  }

  @media (max-width: 768px) {
    body { padding: 24px 12px 60px; }
    .stage-card, .admin-card { padding: 24px; border-radius: 20px; }
    
    .stage { min-height: 550px; height: 65vh; max-height: 750px; padding: 10px; margin-bottom: 24px; }
    .thumb { width: 64px; height: 64px; }
    
    .btn-group { flex-direction: column; }
    .btn-randomize { padding: 14px 24px; font-size: 13px; }

    .layer-controls button { width: 40px; height: 40px; font-size: 20px; }
  }

  @media (max-width: 400px) {
    .stage { min-height: 480px; height: 60vh; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="tag-bar">
    <h1>QNEX BUILDER</h1>
    <button class="btn-randomize" onclick="randomizeLook()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
      Собрать случайно
    </button>
  </header>

  <div class="stage-grid">
    <section class="stage-card">

      <div class="stage-container">
        <div class="stage" id="stage">
          
          <div class="layer-controls" style="top: 10%;">
            <button onclick="cycle('head', -1)">‹</button>
            <button onclick="cycle('head', 1)">›</button>
          </div>
          <div class="layer-controls" style="top: 35%;">
            <button onclick="cycle('top', -1)">‹</button>
            <button onclick="cycle('top', 1)">›</button>
          </div>
          <div class="layer-controls" style="top: 65%;">
            <button onclick="cycle('bottom', -1)">‹</button>
            <button onclick="cycle('bottom', 1)">›</button>
          </div>
          <div class="layer-controls" style="top: 90%;">
            <button onclick="cycle('shoes', -1)">‹</button>
            <button onclick="cycle('shoes', 1)">›</button>
          </div>

          <div class="clothing-layers" id="clothingLayers">
              <img id="layer-head" class="clothing-layer" src="" alt="Голова">
              <img id="layer-top" class="clothing-layer" src="" alt="Верх">
              <img id="layer-bottom" class="clothing-layer" src="" alt="Низ">
              <img id="layer-shoes" class="clothing-layer" src="" alt="Обувь">
          </div>
        </div>
      </div>

      <p class="current-item" id="currentItem"></p>
      <div class="thumb-strip" id="thumbStrip"></div>
    </section>

    <aside class="admin-card">
      <h3>РЕДАКТОР</h3>
      <p class="admin-desc">Выбрано: <strong id="editTargetName" style="color:var(--ink);">...</strong></p>
      
      <div class="admin-form">
        <input type="text" id="editName" placeholder="Название вещи">
        <input type="text" id="editUrl" placeholder="URL картинки (PNG/JPG)">
        <select id="editCategory">
          <option value="head">Голова</option>
          <option value="top">Верх</option>
          <option value="bottom">Низ</option>
          <option value="shoes">Обувь</option>
        </select>
        
        <div class="btn-group">
          <button id="btnUpdate" class="btn-primary">Сохранить</button>
          <button id="btnAdd" class="btn-secondary">Новый товар</button>
        </div>
        <button id="btnDelete" class="btn-danger">Удалить товар</button>
      </div>
    </aside>

  </div>
</div>

<script>
const firebaseConfig = {};

const CATEGORIES = [
  { key: 'head',   label: 'Голова' },
  { key: 'top',    label: 'Верх' },
  { key: 'bottom', label: 'Низ' },
  { key: 'shoes',  label: 'Обувь' },
];

const DEFAULT_ITEMS = {
  head: [
    { id: 'h0', name: 'Без головного убора', image: 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=' },
    { id: 'h1', name: 'Кепка Qnex', image: 'https://i.pinimg.com/736x/3e/79/69/3e7969a4f204067b86e4cf37e1cd6e5e.jpg' }
  ],
  top: [
    { id: 't0', name: 'Без верха', image: 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=' },
    { id: 't2', name: 'Худи Black', image: 'https://i.pinimg.com/736x/1d/7f/50/1d7f50b7dc055ca1684fdc2b4aa07102.jpg' }
  ],
  bottom: [
    { id: 'b0', name: 'Без низа', image: 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=' },
    { id: 'b1', name: 'Шорты Cargo', image: 'https://i.pinimg.com/1200x/9c/44/ae/9c44ae8c7cd9a6c63d1972ab29d9d029.jpg' },
    { id: 'b2', name: 'Джинсы Vintage', image: 'https://i.pinimg.com/736x/e6/11/c9/e611c9ae6515c8dcec8b863f7d1f95ce.jpg' }
  ],
  shoes: [
    { id: 's0', name: 'Без обуви', image: 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=' },
    { id: 's1', name: 'Кроссовки Runner', image: 'https://i.pinimg.com/1200x/13/64/45/136445669b6b2fa4688887a6ab41afcb.jpg' },
    { id: 's2', name: 'Кроссовки Retro', image: 'https://i.pinimg.com/1200x/2b/58/bf/2b58bf95c25ae9ae3e388553e8225aeb.jpg' }
  ]
};

let ITEMS = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
let selected = { head: 1, top: 1, bottom: 1, shoes: 1 };
let active = 'top'; 

const $ = (sel) => document.querySelector(sel);
let db;
let useFirebase = false;

if (firebaseConfig.apiKey) {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  useFirebase = true;
}

function syncData() {
  if (useFirebase) db.ref('qnex_items_v3').set(ITEMS);
  else localStorage.setItem('qnex_items_v3', JSON.stringify(ITEMS));
}

function loadData(cb) {
  if (useFirebase) {
    db.ref('qnex_items_v3').once('value').then(s => {
      if(s.exists()) ITEMS = s.val(); 
      else syncData(); 
      cb();
    });
  } else {
    const l = localStorage.getItem('qnex_items_v3');
    if (l) ITEMS = JSON.parse(l);
    cb();
  }
}

function randomizeLook() {
  CATEGORIES.forEach(c => {
    let min = ITEMS[c.key].length > 1 ? 1 : 0; 
    selected[c.key] = Math.floor(Math.random() * (ITEMS[c.key].length - min)) + min;
  });
  renderAll();
}

function renderAll() {
  renderThumbs(); 
  renderStage(); 
  updateEditForm();
}

function renderThumbs() {
  $('#thumbStrip').innerHTML = ITEMS[active].map((item, i) =>
    `<div class="thumb ${i === selected[active] ? 'selected' : ''}" data-i="${i}" style="background-image: url('${item.image}')" title="${item.name}"></div>`
  ).join('');
  document.querySelectorAll('.thumb').forEach(btn => {
    btn.addEventListener('click', () => { selected[active] = Number(btn.dataset.i); renderAll(); });
  });
}

function renderStage() {
  CATEGORIES.forEach(c => {
    const i = ITEMS[c.key][selected[c.key]];
    const imgEl = $('#layer-' + c.key);
    
    // Если картинка изменилась — обновляем и запускаем анимацию
    if(i && imgEl.src !== i.image) {
      imgEl.src = i.image;
      
      imgEl.classList.remove('animate-pop');
      void imgEl.offsetWidth; // Триггер для перезапуска анимации
      imgEl.classList.add('animate-pop');
    }
  });

  const cur = ITEMS[active][selected[active]];
  if(cur) {
    const lbl = CATEGORIES.find(c => c.key === active).label;
    $('#currentItem').innerHTML = `РЕДАКТИРУЕТСЯ (${lbl.toUpperCase()}): <b>${cur.name}</b>`;
  }
}

function cycle(cat, dir) {
  const l = ITEMS[cat];
  selected[cat] = (selected[cat] + dir + l.length) % l.length;
  active = cat; 
  renderAll();
}

function updateEditForm() {
  const i = ITEMS[active][selected[active]];
  if(!i) return;
  $('#editName').value = i.name; $('#editUrl').value = i.image;
  $('#editCategory').value = active;
  $('#editTargetName').innerText = i.name;
  $('#btnDelete').style.display = ITEMS[active].length <= 1 ? 'none' : 'block';
}

$('#btnUpdate').addEventListener('click', () => {
  const nc = $('#editCategory').value;
  const i = ITEMS[active][selected[active]];
  i.name = $('#editName').value || 'Без названия'; i.image = $('#editUrl').value;
  if (nc !== active) {
    ITEMS[active].splice(selected[active], 1); ITEMS[nc].push(i);
    selected[active] = Math.max(0, selected[active] - 1);
    active = nc; selected[nc] = ITEMS[nc].length - 1;
  }
  syncData(); renderAll();
});

$('#btnAdd').addEventListener('click', () => {
  const cat = $('#editCategory').value, url = $('#editUrl').value.trim(), name = $('#editName').value.trim();
  if (!url || !name) return alert("Введите название и ссылку!");
  ITEMS[cat].push({ id: 'c' + Date.now(), name, image: url });
  active = cat; selected[cat] = ITEMS[cat].length - 1;
  syncData(); renderAll();
});

$('#btnDelete').addEventListener('click', () => {
  if (ITEMS[active].length <= 1 || !confirm('Точно удалить?')) return;
  ITEMS[active].splice(selected[active], 1);
  selected[active] = Math.max(0, selected[active] - 1);
  syncData(); renderAll();
});

loadData(() => renderAll());
</script>
</body>
</html>
