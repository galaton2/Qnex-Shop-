<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qnex Shop</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* THEMES */
        :root {
            --bg: #000000; --text: #ffffff; --border: #ffffff;
            --hover-bg: #ffffff; --hover-text: #000000;
            --gray-bg: #111111;
        }
        [data-theme="light"] {
            --bg: #ffffff; --text: #000000; --border: #000000;
            --hover-bg: #000000; --hover-text: #ffffff;
            --gray-bg: #f5f5f5;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; transition: background-color 0.4s, color 0.4s;
        }

        /* MARQUEE */
        .marquee-wrapper {
            width: 100%; overflow: hidden; border-bottom: 1px solid var(--border);
            padding: 10px 0; white-space: nowrap; background: var(--bg);
        }
        .marquee-content { display: inline-block; animation: marquee 20s linear infinite; }
        .marquee-content a {
            color: var(--text); text-decoration: none; font-size: 14px;
            margin: 0 30px; letter-spacing: 2px; text-transform: uppercase;
        }
        .marquee-content i { margin-right: 8px; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* HEADER */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; cursor: pointer;}
        nav { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .nav-link, .action-btn {
            color: var(--text); text-decoration: none; font-size: 14px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            background: none; border: none; cursor: pointer; transition: 0.3s;
        }
        .nav-link:hover, .action-btn:hover, .nav-link.active { opacity: 0.5; }

        /* VIEWS */
        .view-section { display: none; animation: fadeIn 0.5s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; min-height: 80vh; }

        /* HOME VIEW */
        .hero-banner {
            text-align: center; padding: 100px 20px; 
            border: 1px solid var(--border); margin-bottom: 40px;
            background: var(--gray-bg);
        }
        .hero-banner h1 { font-size: 48px; letter-spacing: 5px; margin-bottom: 20px; text-transform: uppercase; }
        .hero-banner p { max-width: 700px; margin: 0 auto 30px auto; font-size: 16px; line-height: 1.8; opacity: 0.8; }
        .shop-now-btn {
            display: inline-block; padding: 15px 40px; background: var(--text); color: var(--bg);
            text-transform: uppercase; font-weight: bold; letter-spacing: 2px;
            text-decoration: none; transition: 0.3s; border: 1px solid var(--text); cursor: pointer;
        }
        .shop-now-btn:hover { background: var(--bg); color: var(--text); }

        /* CATALOG VIEW */
        .catalog-header { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
        
        .search-container { position: relative; width: 100%; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; }
        .search-input {
            width: 100%; padding: 15px 15px 15px 45px; font-size: 16px;
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            text-transform: uppercase; letter-spacing: 1px; font-family: inherit;
        }
        .search-input:focus { outline: none; border-color: var(--text); box-shadow: 0 0 10px rgba(255,255,255,0.1); }

        .categories-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .cat-btn {
            white-space: nowrap; padding: 10px 25px; border: 1px solid var(--border);
            background: transparent; color: var(--text); text-transform: uppercase;
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 12px;
        }
        .cat-btn.active, .cat-btn:hover { background: var(--text); color: var(--bg); }

        /* Products Grid */
        .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        
        .product-card {
            border: 1px solid var(--border); padding: 15px;
            display: flex; flex-direction: column; transition: transform 0.3s;
            background: var(--bg);
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-img {
            width: 100%; height: 280px; display: flex; align-items: center;
            justify-content: center; border-bottom: 1px solid var(--border);
            margin-bottom: 15px; overflow: hidden; background: var(--gray-bg); position: relative;
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Slider Buttons */
        .slider-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white; border: 1px solid white; 
            padding: 5px 10px; cursor: pointer; transition: 0.3s;
        }
        .slider-btn:hover { background: white; color: black; }
        .slider-btn.prev { left: 5px; }
        .slider-btn.next { right: 5px; }
        .slide-counter {
            position: absolute; bottom: 5px; left: 5px; 
            background: rgba(0,0,0,0.6); color: white; 
            padding: 3px 8px; font-size: 11px; font-weight: bold; border-radius: 10px;
        }

        .product-title { font-size: 14px; font-weight: bold; margin: 10px 0; text-transform: uppercase; }
        .product-price { font-size: 16px; margin-bottom: 15px; opacity: 0.8; }
        
        .buy-btn {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 12px; cursor: pointer; text-transform: uppercase; font-weight: bold;
            letter-spacing: 2px; transition: 0.3s; margin-top: auto; width: 100%; font-size: 12px;
        }
        .buy-btn:hover { background: var(--text); color: var(--bg); }
        .no-results { grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5; text-transform: uppercase; }

        @media (max-width: 900px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 15px; padding: 15px; }
            nav { justify-content: center; width: 100%; gap: 15px; }
            .hero-banner h1 { font-size: 32px; }
            
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-card { padding: 10px; }
            .product-img { height: 200px; } 
            .product-title { font-size: 12px; }
            .product-price { font-size: 14px; margin-bottom: 10px; }
            .buy-btn { padding: 10px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <div class="marquee-wrapper">
        <div class="marquee-content">
            <a href="#" target="_blank"><i class="fab fa-telegram-plane"></i> <span data-i18n="join_tg">JOIN TELEGRAM</span></a>
            <a href="#" target="_blank"><i class="fab fa-instagram"></i> <span data-i18n="join_ig">FOLLOW INSTAGRAM</span></a>
            <a href="#" target="_blank"><i class="fab fa-tiktok"></i> <span data-i18n="join_tt">WATCH TIKTOK</span></a>
            <a href="#" target="_blank"><i class="fab fa-telegram-plane"></i> <span data-i18n="join_tg">JOIN TELEGRAM</span></a>
            <a href="#" target="_blank"><i class="fab fa-instagram"></i> <span data-i18n="join_ig">FOLLOW INSTAGRAM</span></a>
            <a href="#" target="_blank"><i class="fab fa-tiktok"></i> <span data-i18n="join_tt">WATCH TIKTOK</span></a>
        </div>
    </div>

    <header>
        <div class="logo" onclick="switchView('home')">QNEX SHOP</div>
        <nav>
            <button class="nav-link active" id="nav-home" onclick="switchView('home')" data-i18n="nav_home">Home</button>
            <button class="nav-link" id="nav-catalog" onclick="switchView('catalog')" data-i18n="nav_catalog">Catalog</button>
            <button class="action-btn" onclick="toggleLang()" id="lang-btn">RU</button>
            <button class="action-btn" onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>
        </nav>
    </header>

    <div class="container">
        <!-- ================= HOME VIEW ================= -->
        <section id="view-home" class="view-section active">
            <div class="hero-banner">
                <h1 data-i18n="hero_title">Minimalism. Refined.</h1>
                <p data-i18n="hero_desc">
                    <strong>EST. 2021.</strong> Qnex Shop was born from a passion for monochromatic aesthetics. 
                    We strip away the noise to bring you pure, unadulterated style. 
                </p>
                <button class="shop-now-btn" onclick="switchView('catalog')" data-i18n="btn_shop_now">Shop Now</button>
            </div>
            
            <h2 style="text-align: center; text-transform: uppercase; margin: 50px 0 30px 0;" data-i18n="new_arrivals">New Arrivals</h2>
            <div class="products-grid" id="latest-products"></div>
        </section>

        <!-- ================= CATALOG VIEW ================= -->
        <section id="view-catalog" class="view-section">
            <div class="catalog-header">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="search-input" data-i18n-placeholder="search_ph" placeholder="Search products...">
                </div>

                <div class="categories-scroll">
                    <button class="cat-btn active" data-cat="all" data-i18n="cat_all">All</button>
                    <button class="cat-btn" data-cat="hoodie" data-i18n="cat_hoodie">Hoodies</button>
                    <button class="cat-btn" data-cat="t-shirt" data-i18n="cat_tshirt">T-Shirts</button>
                    <button class="cat-btn" data-cat="pants" data-i18n="cat_pants">Pants</button>
                    <button class="cat-btn" data-cat="accessories" data-i18n="cat_accs">Accessories</button>
                </div>
            </div>

            <div class="products-grid" id="catalog-products"></div>
        </section>
    </div>

    <script>
        // --- TRANSLATIONS ---
        const translations = {
            en: {
                nav_home: "Home", nav_catalog: "Catalog",
                join_tg: "JOIN TELEGRAM", join_ig: "FOLLOW INSTAGRAM", join_tt: "WATCH TIKTOK",
                hero_title: "Minimalism. Refined.", 
                hero_desc: "<strong>EST. 2021.</strong> Qnex Shop was born from a passion for monochromatic aesthetics. We strip away the noise to bring you pure, unadulterated style.",
                btn_shop_now: "Shop Now", new_arrivals: "New Arrivals",
                search_ph: "Search products...",
                cat_all: "All", cat_hoodie: "Hoodies", cat_tshirt: "T-Shirts", cat_pants: "Pants", cat_accs: "Accessories",
                buy_btn: "BUY NOW", no_results: "No products found.",
                alert_buy: "Contact us on social media to purchase!"
            },
            ru: {
                nav_home: "Главная", nav_catalog: "Каталог",
                join_tg: "МЫ В TELEGRAM", join_ig: "МЫ В INSTAGRAM", join_tt: "МЫ В TIKTOK",
                hero_title: "Минимализм. Утонченность.", 
                hero_desc: "<strong>ОСНОВАН В 2021.</strong> Qnex Shop создан из страсти к монохромной эстетике. Мы убираем лишний шум, чтобы предложить вам чистый, неподдельный стиль.",
                btn_shop_now: "В Каталог", new_arrivals: "Новинки",
                search_ph: "Поиск товаров...",
                cat_all: "Все", cat_hoodie: "Худи", cat_tshirt: "Футболки", cat_pants: "Штаны", cat_accs: "Аксессуары",
                buy_btn: "КУПИТЬ", no_results: "Товары не найдены.",
                alert_buy: "Свяжитесь с нами в социальных сетях для оформления заказа!"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';
        document.getElementById('lang-btn').innerText = currentLang === 'en' ? 'RU' : 'EN';

        function updateTexts() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[currentLang][key]) el.placeholder = translations[currentLang][key];
            });
        }
        
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            localStorage.setItem('lang', currentLang);
            document.getElementById('lang-btn').innerText = currentLang === 'en' ? 'RU' : 'EN';
            updateTexts();
            renderCatalog(); 
            renderLatest();
        }

        // --- THEME ---
        function toggleTheme() {
            const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
        if (localStorage.getItem('theme') === 'light') document.body.setAttribute('data-theme', 'light'); 
        else document.body.setAttribute('data-theme', 'dark');

        // --- SPA NAVIGATION ---
        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`view-${viewName}`).classList.add('active');
            document.getElementById(`nav-${viewName}`).classList.add('active');
            window.scrollTo(0,0);
        }

        // --- FIREBASE INIT ---
        const firebaseConfig = {
            apiKey: "AIzaSyDX8BiSqlghdgOj4_zPSyPgATfHVV5DNQI",
            authDomain: "gifts-d8f30.firebaseapp.com",
            projectId: "gifts-d8f30"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- VISITS TRACKER ---
        const todayStr = new Date().toISOString().split('T')[0];
        const monthStr = todayStr.substring(0, 7);
        db.collection("analytics").doc("visits").set({
            [todayStr]: firebase.firestore.FieldValue.increment(1),
            [monthStr]: firebase.firestore.FieldValue.increment(1)
        }, { merge: true });

        // --- DATA ---
        let allProducts = [];
        let activeCategory = 'all';
        let searchQuery = '';

        db.collection("products").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            allProducts = [];
            snapshot.forEach((doc) => {
                allProducts.push({ id: doc.id, ...doc.data() });
            });
            renderLatest();
            renderCatalog();
        });

        // --- IMAGE SLIDER LOGIC ---
        window.changeSlide = function(productId, dir, event) {
            event.stopPropagation(); // Чтобы не кликалась карточка товара, если на нее повесить ссылки
            const slider = document.getElementById(`slider-${productId}`);
            if(!slider) return;
            const slides = slider.querySelectorAll('.slide');
            let activeIdx = 0;
            
            slides.forEach((slide, idx) => {
                if(slide.style.display === 'block') activeIdx = idx;
                slide.style.display = 'none';
            });
            
            let newIdx = activeIdx + dir;
            if(newIdx < 0) newIdx = slides.length - 1;
            if(newIdx >= slides.length) newIdx = 0;
            
            slides[newIdx].style.display = 'block';
            
            const counter = slider.parentElement.querySelector('.slide-counter');
            if(counter) counter.innerText = `${newIdx + 1} / ${slides.length}`;
        };

        // --- RENDER CARDS ---
        function createCardHTML(product) {
            const titleStr = product.title || 'Без названия';
            const priceStr = product.price || '0';
            let imagesHtml = '';

            // Поддержка массива фото для слайдера
            if (product.images && product.images.length > 0) {
                imagesHtml = `<div id="slider-${product.id}" style="width:100%; height:100%;">`;
                product.images.forEach((img, index) => {
                    imagesHtml += `<img src="${img}" class="slide" style="display: ${index === 0 ? 'block' : 'none'};">`;
                });
                imagesHtml += `</div>`;
                
                // Добавляем кнопки, если фото больше одного
                if (product.images.length > 1) {
                    imagesHtml += `
                        <button class="slider-btn prev" onclick="changeSlide('${product.id}', -1, event)">❮</button>
                        <button class="slider-btn next" onclick="changeSlide('${product.id}', 1, event)">❯</button>
                        <div class="slide-counter">1 / ${product.images.length}</div>
                    `;
                }
            } else if (product.img) {
                imagesHtml = `<img src="${product.img}">`;
            } else {
                imagesHtml = `<span style="font-size: 60px;">📦</span>`;
            }

            return `
                <div class="product-card">
                    <div class="product-img">${imagesHtml}</div>
                    <div class="product-title">${titleStr}</div>
                    <div class="product-price">$ ${priceStr}</div>
                    <button class="buy-btn" onclick="alert('${translations[currentLang].alert_buy}')">${translations[currentLang].buy_btn}</button>
                </div>
            `;
        }

        function renderLatest() {
            const container = document.getElementById('latest-products');
            container.innerHTML = '';
            allProducts.slice(0, 4).forEach(prod => { container.innerHTML += createCardHTML(prod); });
        }

        function renderCatalog() {
            const container = document.getElementById('catalog-products');
            container.innerHTML = '';

            const filtered = allProducts.filter(prod => {
                const titleLower = (prod.title || '').toLowerCase();
                const matchesSearch = titleLower.includes(searchQuery);
                
                // Теперь фильтрация идет жестко по базе данных (категории), а не по поиску в названии
                let matchesCategory = true;
                if (activeCategory !== 'all') {
                    matchesCategory = (prod.category === activeCategory);
                }
                
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="no-results">${translations[currentLang].no_results}</div>`;
                return;
            }
            filtered.forEach(prod => { container.innerHTML += createCardHTML(prod); });
        }

        // --- SEARCH ---
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderCatalog();
        });

        // --- CATEGORIES ---
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                activeCategory = e.target.getAttribute('data-cat');
                renderCatalog();
            });
        });

        updateTexts();
    </script>
</body>
</html>
