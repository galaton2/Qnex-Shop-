<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&W STORE</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS переменные для смены темы */
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: #000000;
            --hover-bg: #000000;
            --hover-text: #ffffff;
        }
        /* Темная тема (инверсия) */
        [data-theme="dark"] {
            --bg: #000000;
            --text: #ffffff;
            --border: #ffffff;
            --hover-bg: #ffffff;
            --hover-text: #000000;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace, sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            border-bottom: 1px solid var(--border);
            font-size: 18px;
        }
        .social-icons a {
            color: var(--text);
            margin-right: 15px;
            text-decoration: none;
            transition: opacity 0.3s;
        }
        .social-icons a:hover { opacity: 0.5; }
        .theme-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap; /* Для мобилок */
            gap: 15px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 15px;
            font-size: 14px;
            text-transform: uppercase;
        }
        nav a:hover { text-decoration: underline; }
        
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .product-card {
            border: 1px solid var(--border);
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
        }
        .product-img {
            width: 100%;
            height: 300px; /* Увеличенная высота для фото */
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 15px;
            overflow: hidden;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-title { margin: 10px 0; text-transform: uppercase; font-size: 18px; }
        .product-price { font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        .buy-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
            margin-top: auto;
        }
        .buy-btn:hover { background: var(--hover-bg); color: var(--hover-text); }

        /* Адаптация под телефоны */
        @media (max-width: 600px) {
            .top-bar, header { padding: 10px 20px; }
            header { flex-direction: column; align-items: flex-start; }
            nav { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
            nav a { margin-left: 0; margin-right: 15px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="social-icons">
            <a href="https://t.me/your_telegram" target="_blank"><i class="fab fa-telegram-plane"></i></a>
            <a href="https://instagram.com/your_insta" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://tiktok.com/@your_tiktok" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
        <button class="theme-btn" onclick="toggleTheme()" title="Сменить тему"><i class="fas fa-adjust"></i></button>
    </div>

    <header>
        <div class="logo">B&W STORE</div>
        <nav>
            <a href="#">Каталог</a>
            <a href="admin.html" style="font-weight: bold; text-decoration: underline;">Админка</a>
        </nav>
    </header>

    <div class="container">
        <h2 style="text-align: center; text-transform: uppercase; margin-bottom: 40px;">Каталог</h2>
        <div class="products-grid" id="products-container">
            </div>
    </div>

    <script>
        // --- СМЕНА ТЕМЫ ---
        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
        // Загрузка сохраненной темы
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }

        // --- ВАШ FIREBASE КОНФИГ ---
        const firebaseConfig = {
            apiKey: "ТВОЙ_API_KEY",
            authDomain: "ТВОЙ_PROJECT_ID.firebaseapp.com",
            projectId: "ТВОЙ_PROJECT_ID",
            storageBucket: "ТВОЙ_PROJECT_ID.appspot.com",
            messagingSenderId: "ТВОЙ_SENDER_ID",
            appId: "ТВОЙ_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- ВЫВОД ТОВАРОВ ---
        db.collection("products").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            if (snapshot.empty) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Товаров пока нет.</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const product = doc.data();
                const card = document.createElement('div');
                card.className = 'product-card';
                
                const imgContent = product.img.length <= 5 
                    ? `<span style="font-size: 80px;">${product.img}</span>` 
                    : `<img src="${product.img}">`;

                card.innerHTML = `
                    <div class="product-img">${imgContent}</div>
                    <h3 class="product-title">${product.title}</h3>
                    <div class="product-price">${product.price} ₽</div>
                    <button class="buy-btn" onclick="alert('Для заказа ${product.title} перейдите в наши соцсети!')">Купить</button>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
