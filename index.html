<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qnex-Shop | Build your wish</title>
    <style>
        /* === Базовые переменные и сброс === */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #333333;
            --disabled-color: #555555;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 70px; /* Отступ для нижнего меню */
        }

        /* === Типографика и Контент === */
        .hero {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid var(--accent-color);
        }

        .hero h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .about-us {
            padding: 40px 20px;
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #aaaaaa;
        }

        .about-us .origin {
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
            color: var(--text-color);
        }

        .flag-icon {
            font-size: 1.2rem;
            vertical-align: middle;
            margin-left: 5px;
        }

        /* === Карточки товаров и Скелетоны === */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .product-card {
            cursor: pointer;
            transition: transform var(--transition-speed);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background-color: var(--accent-color);
            overflow: hidden;
            border-radius: 8px;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0; /* Скрыто до загрузки */
            transition: opacity 0.5s ease;
        }

        .product-image.loaded {
            opacity: 1;
        }

        /* Skeleton Animation */
        .skeleton {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }

        .loaded + .skeleton {
            display: none; /* Убираем скелетон, когда картинка загружена */
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .product-info {
            padding: 10px 0;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 500;
        }

        .product-price {
            font-size: 0.9rem;
            color: #aaaaaa;
            margin-top: 4px;
        }

        /* === Нижняя навигация === */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .burger-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 10px 20px;
        }

        /* === Bottom Sheet (Drawer) === */
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-speed);
            z-index: 200;
        }

        .drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background-color: #111;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 201;
            padding: 30px 20px;
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .sheet-line {
            width: 40px;
            height: 4px;
            background: #444;
            border-radius: 2px;
            margin: 0 auto 20px auto;
        }

        .sheet-btn {
            width: 100%;
            padding: 15px;
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .sheet-btn:disabled {
            background: var(--disabled-color);
            color: #888;
            cursor: not-allowed;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .badge {
            font-size: 0.7rem;
            background: #333;
            color: #ccc;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: lowercase;
        }

        /* === Детальная карточка товара (Попап) === */
        .product-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            z-index: 300;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
        }

        .product-modal.active {
            transform: translateX(0);
        }

        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent-color);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Нативный свайп для галереи */
        .gallery-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE */
            height: 60vh;
            background: #0a0a0a;
        }
        
        .gallery-container::-webkit-scrollbar {
            display: none; /* Chrome, Safari */
        }

        .gallery-slide {
            flex: 0 0 100%;
            scroll-snap-align: center;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-info {
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Главный экран -->
    <header class="hero">
        <h1>Build your wish</h1>
    </header>

    <section class="about-us">
        <p>Мы убираем лишний шум, чтобы предложить вам чистый, неподдельный стиль. Строгость линий и качество в каждой детали.</p>
        <span class="origin">Основан в Узбекистане <span class="flag-icon">🇺🇿</span></span>
    </section>

    <!-- Сетка товаров -->
    <main class="products-grid" id="products-grid">
        <!-- Товары инжектятся через JS -->
    </main>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <button class="burger-btn" id="burger-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </nav>

    <!-- Drawer (Bottom Sheet) -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-line"></div>
        <button class="sheet-btn">Доставка</button>
        <button class="sheet-btn" disabled>
            Создать собственный аутфит
            <span class="badge">(пока в разработке)</span>
        </button>
    </div>

    <!-- Попап детального товара -->
    <div class="product-modal" id="product-modal">
        <div class="modal-header">
            <h2 id="modal-title">Товар</h2>
            <button class="close-btn" id="close-modal">✕</button>
        </div>
        <div class="gallery-container" id="modal-gallery">
            <!-- Слайды галереи подгружаются сюда -->
        </div>
        <div class="modal-info">
            <h3 id="modal-price" class="product-price" style="font-size: 1.5rem; margin-bottom: 20px;"></h3>
            <button class="sheet-btn">В корзину</button>
        </div>
    </div>

    <script>
        // === 1. Имитация API и данных ===
        const CACHE_KEY = 'qnex_products_cache';
        
        // Моковые данные (в реальности это ответ от Firebase/Backend)
        const mockApiData = [
            {
                id: '1',
                title: 'Minimalist Hoodie',
                price: 55,
                // Первая картинка для сетки, остальные для галереи
                images: [
                    'https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=500&q=80',
                    'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=500&q=80',
                    'https://images.unsplash.com/photo-1509942774463-acf339cf87d5?auto=format&fit=crop&w=500&q=80'
                ]
            },
            {
                id: '2',
                title: 'Oversize T-Shirt',
                price: 30,
                images: [
                    'https://images.unsplash.com/photo-1529374255404-311a2a4f1fd9?auto=format&fit=crop&w=500&q=80',
                    'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&w=500&q=80'
                ]
            }
        ];

        // === 2. Кэширование и Инициализация ===
        async function fetchProducts() {
            // Проверяем LocalStorage на наличие кэша
            const cachedData = localStorage.getItem(CACHE_KEY);
            
            if (cachedData) {
                console.log('Загружено из кэша (Мгновенно)');
                renderGrid(JSON.parse(cachedData));
                // Опционально: можно запустить фоновый fetch для обновления кэша без блокировки UI
                return;
            }

            // Имитация асинхронной задержки сети, если кэша нет
            renderSkeletons(4); 
            
            setTimeout(() => {
                localStorage.setItem(CACHE_KEY, JSON.stringify(mockApiData));
                renderGrid(mockApiData);
            }, 1500);
        }

        // === 3. Рендер Ленты (Lazy Loading первых картинок) ===
        const grid = document.getElementById('products-grid');

        function renderSkeletons(count) {
            grid.innerHTML = Array(count).fill(`
                <div class="product-card">
                    <div class="image-wrapper">
                        <div class="skeleton"></div>
                    </div>
                    <div class="product-info">
                        <div style="height: 16px; width: 70%; background: #222; margin-bottom: 8px; border-radius: 4px;"></div>
                        <div style="height: 14px; width: 40%; background: #222; border-radius: 4px;"></div>
                    </div>
                </div>
            `).join('');
        }

        function renderGrid(products) {
            grid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openProductDetails(product);

                // Загружаем строго только первую фотографию из массива
                const firstImage = product.images[0];

                card.innerHTML = `
                    <div class="image-wrapper">
                        <!-- onload триггерит добавление класса, который убирает скелетон -->
                        <img src="${firstImage}" alt="${product.title}" loading="lazy" class="product-image" onload="this.classList.add('loaded')">
                        <div class="skeleton"></div>
                    </div>
                    <div class="product-info">
                        <div class="product-title">${product.title}</div>
                        <div class="product-price">$${product.price}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // === 4. Детальная карточка и Галерея ===
        const modal = document.getElementById('product-modal');
        const modalGallery = document.getElementById('modal-gallery');
        const modalTitle = document.getElementById('modal-title');
        const modalPrice = document.getElementById('modal-price');

        function openProductDetails(product) {
            modalTitle.textContent = product.title;
            modalPrice.textContent = `$${product.price}`;
            modalGallery.innerHTML = '';

            // Подгружаем ВСЕ фотографии только после клика по карточке
            product.images.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = 'gallery-slide';
                // Lazy loading внутри модалки для экономии трафика на длинных свайпах
                img.loading = 'lazy'; 
                modalGallery.appendChild(img);
            });

            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Блокируем скролл фона
        }

        document.getElementById('close-modal').onclick = () => {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        };

        // === 5. Логика Bottom Sheet (Drawer) ===
        const burgerBtn = document.getElementById('burger-btn');
        const bottomSheet = document.getElementById('bottom-sheet');
        const drawerOverlay = document.getElementById('drawer-overlay');

        function toggleDrawer(forceClose = false) {
            const isActive = bottomSheet.classList.contains('active');
            if (isActive || forceClose) {
                bottomSheet.classList.remove('active');
                drawerOverlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                bottomSheet.classList.add('active');
                drawerOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        burgerBtn.addEventListener('click', () => toggleDrawer());
        drawerOverlay.addEventListener('click', () => toggleDrawer(true));

        // Swipe down to close drawer
        let touchStartY = 0;
        bottomSheet.addEventListener('touchstart', e => touchStartY = e.changedTouches[0].screenY, {passive: true});
        bottomSheet.addEventListener('touchend', e => {
            if (e.changedTouches[0].screenY - touchStartY > 50) toggleDrawer(true);
        }, {passive: true});

        // === Запуск приложения ===
        fetchProducts();

    </script>
</body>
</html>
